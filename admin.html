<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mindset Enterprise</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
--bg:#0B0F19;
--card:#111827;
--accent:#635BFF;
--cyan:#00F5FF;
--danger:#FF4D4D;
--text:#EAF2FF;
--muted:#94A3B8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);
}

header h2{color:var(--accent)}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{background:var(--accent);color:#fff}
.danger{background:var(--danger);color:#fff}
.cyan{background:var(--cyan);color:#000}

.container{padding:40px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:var(--card);
padding:20px;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,.3);
}

.metric{
font-size:28px;
color:var(--accent);
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

tr:hover{
background:rgba(99,91,255,.05);
}

input{
padding:10px;
width:100%;
margin-bottom:15px;
border-radius:8px;
border:none;
background:#1F2937;
color:#fff;
}

.log{
font-size:12px;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,.05);
color:var(--muted);
}
</style>
</head>

<body>

<header>
<h2>Mindset Enterprise</h2>
<div>
<button class="cyan" onclick="resetar()">Resetar Sistema</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<div class="container">

<div class="grid">
<div class="card">
<div>Total Inscritos</div>
<div class="metric" id="total">0</div>
</div>

<div class="card">
<div>Média Diária</div>
<div class="metric" id="media">0</div>
</div>
</div>

<div class="grid">
<div class="card"><canvas id="grafico"></canvas></div>
</div>

<h3 style="margin-top:40px;">Usuários</h3>
<input type="text" id="buscar" placeholder="Buscar...">

<table>
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Idade</th>
<th>Telegram</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3 style="margin-top:40px;">Logs</h3>
<div id="logs"></div>

</div>

<script>
let token=sessionStorage.getItem("adminToken");
let role=sessionStorage.getItem("adminRole");
let lista=[];
let chart;

if(!token){location.reload();}
