<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mindset Elite • Enterprise</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#070A12;
  --bg2:#0B1020;
  --glass:rgba(255,255,255,.06);
  --glass2:rgba(255,255,255,.08);
  --stroke:rgba(255,255,255,.10);
  --stroke2:rgba(99,91,255,.35);

  --card:rgba(17,24,39,.55);
  --card2:rgba(20,28,46,.65);

  --accent:#635BFF; /* stripe-ish */
  --cyan:#00F5FF;
  --ok:#00FFAA;
  --danger:#FF4D4D;

  --text:#EAF2FF;
  --muted:#94A3B8;

  --shadow: 0 24px 80px rgba(0,0,0,.55);
  --shadow2: 0 10px 40px rgba(99,91,255,.18);
  --r:18px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,Arial}
html,body{height:100%}

body{
  background:
    radial-gradient(900px 500px at 15% -10%, rgba(99,91,255,.25), transparent 60%),
    radial-gradient(800px 500px at 90% 10%, rgba(0,245,255,.14), transparent 55%),
    radial-gradient(700px 450px at 50% 115%, rgba(255,77,77,.10), transparent 60%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  color:var(--text);
  overflow-x:hidden;
}

/* ====== Topbar ====== */
header{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 22px;
  background:linear-gradient(180deg, rgba(10,15,28,.78), rgba(10,15,28,.55));
  backdrop-filter: blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:40px;height:40px;border-radius:14px;
  background:linear-gradient(135deg, rgba(99,91,255,.35), rgba(0,245,255,.16));
  border:1px solid rgba(99,91,255,.35);
  box-shadow:0 0 45px rgba(99,91,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;
  letter-spacing:.5px;
  color:rgba(234,242,255,.92);
}

.brand h2{
  font-size:14px;
  line-height:1.1;
  letter-spacing:.3px;
}
.brand small{
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-weight:700;
  font-size:11px;
}

/* right actions */
.actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  cursor:pointer;
  font-weight:900;
  padding:10px 12px;
  border-radius:12px;
  transition:.18s;
  color:var(--text);
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
}
.btn:hover{ transform: translateY(-1px); border-color: rgba(99,91,255,.35); box-shadow: 0 0 0 4px rgba(99,91,255,.12); }
.btn:active{ transform: translateY(0px) scale(.99); }

.btn-primary{
  background:linear-gradient(90deg, var(--accent), #7A74FF);
  border:1px solid rgba(99,91,255,.35);
  color:#fff;
}
.btn-primary:hover{ box-shadow: 0 0 0 4px rgba(99,91,255,.14), 0 12px 40px rgba(99,91,255,.20); }

.btn-danger{
  background:rgba(255,77,77,.14);
  border:1px solid rgba(255,77,77,.35);
  color:#FFD7D7;
}
.btn-danger:hover{ box-shadow: 0 0 0 4px rgba(255,77,77,.12); border-color: rgba(255,77,77,.55); }

.pill{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  color:rgba(234,242,255,.80);
  font-size:12px;
  font-weight:900;
}

.dot{
  width:8px;height:8px;border-radius:99px;
  background:rgba(255,255,255,.30);
  box-shadow:0 0 0 3px rgba(255,255,255,.08);
}
.dot.ok{ background:var(--ok); box-shadow:0 0 0 3px rgba(0,255,170,.12); }
.dot.bad{ background:var(--danger); box-shadow:0 0 0 3px rgba(255,77,77,.12); }

/* badge animado */
.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:22px;
  height:22px;
  padding:0 8px;
  border-radius:999px;
  background:rgba(0,245,255,.14);
  border:1px solid rgba(0,245,255,.30);
  color:rgba(234,242,255,.92);
  font-size:12px;
  font-weight:900;
  position:relative;
  overflow:hidden;
}
.badge.pulse::after{
  content:"";
  position:absolute;
  inset:-4px;
  border-radius:999px;
  border:2px solid rgba(0,245,255,.25);
  animation:pulse 1.1s ease-out infinite;
}
@keyframes pulse{
  0%{ transform: scale(.90); opacity: .9; }
  100%{ transform: scale(1.25); opacity: 0; }
}

/* ====== Container ====== */
.container{ padding:22px; max-width:1180px; margin:0 auto; }
.fade-in{ animation: fadeIn .35s ease-out both; }
@keyframes fadeIn{ from{opacity:0; transform: translateY(8px);} to{opacity:1; transform: translateY(0);} }

/* ====== Cards ====== */
.grid{
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  gap:14px;
  margin-top:16px;
  margin-bottom:16px;
}

.card{
  grid-column: span 4;
  background:linear-gradient(180deg, rgba(17,24,39,.62), rgba(17,24,39,.48));
  border:1px solid rgba(255,255,255,.10);
  border-radius:var(--r);
  box-shadow: var(--shadow);
  padding:16px;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  inset:-1px;
  background: radial-gradient(700px 160px at 10% 0%, rgba(99,91,255,.20), transparent 55%),
              radial-gradient(700px 160px at 90% 0%, rgba(0,245,255,.10), transparent 55%);
  pointer-events:none;
  opacity:.7;
}

.card h4{
  position:relative;
  font-size:12px;
  color:rgba(234,242,255,.72);
  font-weight:900;
  letter-spacing:.25px;
  margin-bottom:10px;
}
.metric{
  position:relative;
  font-size:34px;
  font-weight:1000;
  color:#fff;
  letter-spacing:.2px;
}
.sub{
  position:relative;
  margin-top:6px;
  font-size:12px;
  color:rgba(148,163,184,.95);
  font-weight:800;
}

.card.wide{ grid-column: span 12; padding:14px; }
.card.half{ grid-column: span 6; }
.card.third{ grid-column: span 4; }

/* ====== Controls ====== */
.panel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  border-radius:var(--r);
  box-shadow: var(--shadow);
  padding:14px;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.input, .select{
  padding:12px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(15,23,42,.55);
  color:var(--text);
  outline:none;
  transition:.18s;
}
.input:focus, .select:focus{
  border-color: rgba(99,91,255,.40);
  box-shadow: 0 0 0 4px rgba(99,91,255,.12);
}
.input{ flex:1; min-width:220px; }

.minmax{
  display:flex;
  gap:10px;
}
.minmax .input{ width:150px; min-width:140px; flex:0; }

/* ====== Table ====== */
.table-wrap{
  margin-top:12px;
  overflow:auto;
  border-radius:var(--r);
  border:1px solid rgba(255,255,255,.10);
  background:rgba(7,10,18,.35);
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:780px;
}

th,td{
  padding:12px 12px;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:13px;
  white-space:nowrap;
}

th{
  text-align:left;
  color:rgba(234,242,255,.70);
  background:rgba(255,255,255,.03);
  font-weight:1000;
}

tbody tr:hover{
  background:rgba(99,91,255,.06);
}

.tag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,245,255,.10);
  border:1px solid rgba(0,245,255,.22);
  font-weight:900;
  font-size:12px;
}

.del{
  padding:9px 10px;
  border-radius:12px;
  border:1px solid rgba(255,77,77,.35);
  background:rgba(255,77,77,.14);
  color:#FFD7D7;
  font-weight:1000;
}
.del:hover{
  border-color:rgba(255,77,77,.55);
  box-shadow:0 0 0 4px rgba(255,77,77,.12);
}

/* ====== Logs ====== */
.logs{
  max-height:320px;
  overflow:auto;
  padding-right:4px;
}
.log{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px 10px;
  border-bottom:1px solid rgba(255,255,255,.06);
  color:rgba(148,163,184,.95);
  font-size:12px;
}
.log strong{ color:rgba(234,242,255,.88); }
.log .t{ color:rgba(234,242,255,.70); font-weight:900; }
.log .pill2{
  display:inline-flex;
  align-items:center;
  padding:4px 9px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.04);
  color:rgba(234,242,255,.75);
  font-weight:900;
}

/* ====== Toast ====== */
.toast{
  position:fixed;
  right:16px;
  bottom:16px;
  z-index:99;
  width:min(420px, calc(100vw - 32px));
  background:rgba(11,18,32,.86);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  padding:12px 12px;
  display:none;
  overflow:hidden;
}
.toast.show{ display:block; animation: toastIn .22s ease-out both; }
@keyframes toastIn{ from{opacity:0; transform: translateY(10px);} to{opacity:1; transform: translateY(0);} }
.toast .top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.toast .top strong{ font-size:13px; }
.toast .top button{
  background:transparent;
  border:none;
  color:rgba(234,242,255,.65);
  cursor:pointer;
  font-size:16px;
}
.toast .msg{
  margin-top:4px;
  color:rgba(148,163,184,.95);
  font-size:12px;
}
.toast.ok{ border-color: rgba(0,255,170,.22); }
.toast.bad{ border-color: rgba(255,77,77,.22); }
.toast::before{
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(600px 180px at 10% 0%, rgba(99,91,255,.22), transparent 60%),
              radial-gradient(600px 180px at 90% 0%, rgba(0,245,255,.14), transparent 60%);
  pointer-events:none;
  opacity:.55;
}

/* ====== Responsive ====== */
@media (max-width: 980px){
  .card{ grid-column: span 6; }
  .card.half{ grid-column: span 12; }
}
@media (max-width: 720px){
  header{ padding:16px 14px; }
  .container{ padding:14px; }
  .card{ grid-column: span 12; }
  .minmax{ width:100%; }
  .minmax .input{ flex:1; width:auto; }
  table{ min-width: 720px; }
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <div class="logo">ME</div>
    <div>
      <h2>Mindset Enterprise</h2>
      <small id="roleLine">role: —</small>
    </div>
  </div>

  <div class="actions">
    <div class="pill" id="statusPill">
      <span class="dot bad" id="statusDot"></span>
      <span id="statusText">Desconectado</span>
      <span class="badge" id="liveBadge" title="Atualizações em tempo real">0</span>
    </div>

    <div id="adminButtons"></div>
  </div>
</header>

<div class="container fade-in">

  <!-- MÉTRICAS -->
  <div class="grid" aria-label="Métricas">
    <div class="card">
      <h4>Total inscritos</h4>
      <div class="metric" id="mTotal">0</div>
      <div class="sub">base atual</div>
    </div>

    <div class="card">
      <h4>Vagas disponíveis</h4>
      <div class="metric" id="mVagas">0</div>
      <div class="sub">controlado pelo admin</div>
    </div>

    <div class="card">
      <h4>Média diária</h4>
      <div class="metric" id="mMedia">0</div>
      <div class="sub">inscrições/dia</div>
    </div>

    <div class="card wide">
      <h4>Crescimento (timeline)</h4>
      <canvas id="grafico" height="80"></canvas>
    </div>
  </div>

  <!-- CONTROLES -->
  <div class="panel">
    <div class="controls">
      <input class="input" type="text" id="buscar" placeholder="🔍 Busca inteligente (nome ou telegram) — filtra enquanto digita" />

      <div class="minmax" title="Filtro por idade">
        <input class="input" type="number" id="idadeMin" placeholder="Idade mín." min="0" />
        <input class="input" type="number" id="idadeMax" placeholder="Idade máx." min="0" />
      </div>

      <button class="btn" id="btnRefresh" onclick="carregar(true)">↻ Atualizar</button>
    </div>
  </div>

  <!-- TABELA -->
  <div class="panel" style="margin-top:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
      <div style="font-weight:1000;color:rgba(234,242,255,.90);">Usuários</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <span class="pill" style="padding:8px 10px;">
          <span style="opacity:.9;">Filtrados:</span>
          <span class="badge" id="filteredBadge">0</span>
        </span>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Idade</th>
            <th>Telegram</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- LOGS -->
  <div class="panel" style="margin-top:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
      <div style="font-weight:1000;color:rgba(234,242,255,.90);">Logs Administrativos</div>
      <button class="btn" onclick="carregarLogs(true)">↻ Atualizar logs</button>
    </div>
    <div class="logs" id="logs" style="margin-top:10px;"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="top">
    <strong id="toastTitle">Info</strong>
    <button onclick="hideToast()">×</button>
  </div>
  <div class="msg" id="toastMsg">—</div>
</div>

<script>
/* =========================================================
   CONFIG
========================================================= */
let token = sessionStorage.getItem("adminToken");
let role = sessionStorage.getItem("adminRole");

let lista = [];
let chart = null;

// Para detectar novos inscritos
let knownIds = new Set();
let lastTotal = 0;

// badge live
let liveCount = 0;

const $ = (id) => document.getElementById(id);

if(!token){
  // se você ainda não tem tela de login, seu fluxo atual dá reload
  location.reload();
}

/* =========================================================
   UI HELPERS
========================================================= */
function setStatus(ok){
  $("statusDot").classList.toggle("ok", !!ok);
  $("statusDot").classList.toggle("bad", !ok);
  $("statusText").textContent = ok ? "Conectado" : "Desconectado";
}
function bumpBadge(n=1){
  liveCount += n;
  $("liveBadge").textContent = String(liveCount);
  $("liveBadge").classList.add("pulse");
  setTimeout(()=> $("liveBadge").classList.remove("pulse"), 1200);
}
function toast(type, title, msg){
  const t = $("toast");
  t.classList.remove("ok","bad");
  t.classList.add(type === "ok" ? "ok" : "bad");
  $("toastTitle").textContent = title;
  $("toastMsg").textContent = msg;
  t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(hideToast, 3200);
}
function hideToast(){ $("toast").classList.remove("show"); }

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* =========================================================
   SOM ELEGANTE (sem arquivo externo)
========================================================= */
function playNotify(){
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();

    const o1 = ctx.createOscillator();
    const g = ctx.createGain();

    // som "ding" curto e elegante
    o1.type = "sine";
    o1.frequency.setValueAtTime(880, ctx.currentTime);
    o1.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.08);

    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);

    o1.connect(g);
    g.connect(ctx.destination);

    o1.start();
    o1.stop(ctx.currentTime + 0.24);

    // fecha depois pra não segurar recurso
    setTimeout(()=> ctx.close(), 350);
  }catch(e){
    // se o browser bloquear (sem interação), não quebra nada
  }
}

/* =========================================================
   BOTÕES POR ROLE (Reset/Excluir só superadmin)
========================================================= */
function renderButtons(){
  $("roleLine").textContent = `role: ${role || "—"}`;

  const div = $("adminButtons");
  div.innerHTML = "";

  if(role === "superadmin"){
    div.innerHTML += `<button class="btn btn-primary" onclick="resetarVagas()">Resetar vagas</button>`;
  }

  div.innerHTML += `<button class="btn" onclick="logout()">Logout</button>`;
}
renderButtons();

/* =========================================================
   WEBSOCKET REAL
   - Se seu admin.html estiver no MESMO domínio do backend, funciona com location.host.
   - Se você hospeda admin.html em outro domínio, troque a URL para o domínio do backend.
========================================================= */
let ws;
function initWS(){
  try{
    ws = new WebSocket(
      location.protocol === "https:"
        ? "wss://" + location.host
        : "ws://" + location.host
    );

    ws.onopen = () => {
      setStatus(true);
      toast("ok","Live","Atualização em tempo real ativa.");
    };

    ws.onclose = () => {
      setStatus(false);
      // tenta reconectar
      setTimeout(initWS, 1200);
    };

    ws.onerror = () => {
      setStatus(false);
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if(msg.type === "data_update"){
        bumpBadge(1);
        carregar(false, true); // wsTrigger = true
      }

      if(msg.type === "log_update"){
        bumpBadge(1);
        carregarLogs(false);
      }

      if(msg.type === "connected"){
        setStatus(true);
      }
    };
  }catch(e){
    setStatus(false);
  }
}
initWS();

/* =========================================================
   CONTADORES ANIMADOS
========================================================= */
function animateNumber(el, to, ms=650){
  const from = Number(el.dataset.v || "0");
  const start = performance.now();
  el.dataset.v = String(to);

  function tick(now){
    const p = Math.min(1, (now - start)/ms);
    // easing
    const eased = 1 - Math.pow(1-p, 3);
    const val = Math.round(from + (to - from)*eased);
    el.textContent = String(val);
    if(p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* =========================================================
   CARREGAR DADOS
========================================================= */
async function carregar(forceToast=false, wsTrigger=false){
  const btn = $("btnRefresh");
  btn.disabled = true;
  btn.textContent = "…";

  try{
    const res = await fetch("/admin/inscritos",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-admin-token":token
      }
    });

    if(res.status === 401){
      toast("bad","Sessão","Sessão inválida/expirada. Faça login novamente.");
      logout();
      return;
    }

    const data = await res.json();

    // backend já manda role aqui também (no seu server.js)
    if(data.role && data.role !== role){
      role = data.role;
      sessionStorage.setItem("adminRole", role);
      renderButtons();
    }

    lista = Array.isArray(data.inscritos) ? data.inscritos : [];
    const vagas = Number(data.vagas ?? 0);

    // Detectar novos inscritos (para notificação)
    const newOnes = [];
    const newIds = new Set();
    for(const u of lista){
      if(u && u.id) newIds.add(u.id);
      if(u && u.id && !knownIds.has(u.id)) newOnes.push(u);
    }

    const totalNow = lista.length;

    // Atualiza knownIds
    knownIds = newIds;

    // Métricas
    animateNumber($("mTotal"), totalNow);
    animateNumber($("mVagas"), vagas);

    const media = calcMediaDiaria(lista);
    $("mMedia").textContent = String(media);

    render();
    grafico();

    // Notificação: só quando vem via websocket OU quando total aumentou
    if(newOnes.length > 0 && (wsTrigger || totalNow > lastTotal)){
      // notificação elegante
      const last = newOnes[newOnes.length - 1];
      toast("ok","Nova inscrição","Entrou: " + (last?.nome || "novo usuário"));
      playNotify();
      bumpBadge(newOnes.length);
    }else if(forceToast){
      toast("ok","Atualizado","Dados carregados.");
    }

    lastTotal = totalNow;

  }catch(e){
    toast("bad","Erro","Falha ao carregar dados.");
  }finally{
    btn.disabled = false;
    btn.textContent = "↻ Atualizar";
  }
}

/* média diária simples */
function calcMediaDiaria(list){
  if(!list.length) return "0.0";
  const porDia = {};
  list.forEach(u=>{
    const d = u?.data ? new Date(u.data) : new Date();
    const key = d.toISOString().split("T")[0];
    porDia[key] = (porDia[key]||0)+1;
  });
  const days = Object.keys(porDia).length || 1;
  const media = list.length / days;
  return media.toFixed(1);
}

carregar(true);
carregarLogs(true);

/* =========================================================
   RENDER TABELA (busca automática + filtro por idade)
========================================================= */
function render(){
  const filtro = ($("buscar").value || "").toLowerCase().trim();
  const min = $("idadeMin").value ? Number($("idadeMin").value) : null;
  const max = $("idadeMax").value ? Number($("idadeMax").value) : null;

  const tbody = $("tbody");
  tbody.innerHTML = "";

  const filtered = lista.filter(u=>{
    const nome = String(u?.nome || "").toLowerCase();
    const tg = String(u?.telegram || "").toLowerCase();
    const idade = Number(u?.idade ?? NaN);

    const hit = !filtro || nome.includes(filtro) || tg.includes(filtro);

    let hitIdade = true;
    if(min !== null && !Number.isNaN(idade)) hitIdade = hitIdade && idade >= min;
    if(max !== null && !Number.isNaN(idade)) hitIdade = hitIdade && idade <= max;

    // se idade for inválida e o user colocou filtro min/max, remove
    if((min !== null || max !== null) && Number.isNaN(idade)) hitIdade = false;

    return hit && hitIdade;
  });

  $("filteredBadge").textContent = String(filtered.length);

  if(!filtered.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="padding:14px;color:rgba(148,163,184,.95);">
          Nenhum resultado com os filtros atuais.
        </td>
      </tr>
    `;
    return;
  }

  filtered.forEach((u,i)=>{
    const btn = (role === "superadmin")
      ? `<button class="del" onclick="excluir('${escapeHtml(u.id)}')">Excluir</button>`
      : `<span style="color:rgba(148,163,184,.9);font-weight:900;">Sem permissão</span>`;

    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td><strong>${escapeHtml(u.nome)}</strong></td>
        <td>${escapeHtml(u.idade)}</td>
        <td><span class="tag">${escapeHtml(u.telegram)}</span></td>
        <td>${btn}</td>
      </tr>
    `;
  });
}

$("buscar").addEventListener("input", render);
$("idadeMin").addEventListener("input", render);
$("idadeMax").addEventListener("input", render);

/* =========================================================
   GRÁFICO (linha) – inscrições por dia
========================================================= */
function grafico(){
  const porDia = {};
  lista.forEach(u=>{
    const d = u?.data ? new Date(u.data) : new Date();
    const key = d.toISOString().split("T")[0];
    porDia[key] = (porDia[key]||0) + 1;
  });

  const labels = Object.keys(porDia).sort();
  const values = labels.map(k => porDia[k]);

  if(chart) chart.destroy();

  chart = new Chart($("grafico"),{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"Inscrições",
        data: values,
        borderColor: "#635BFF",
        backgroundColor: "rgba(99,91,255,.12)",
        fill: true,
        tension: 0.32,
        pointRadius: 2,
        pointHoverRadius: 5
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{ display:false },
        tooltip:{
          callbacks:{
            title:(items)=> "Dia: " + (items?.[0]?.label || "")
          }
        }
      },
      scales:{
        x:{
          grid:{ color:"rgba(255,255,255,.04)" },
          ticks:{ color:"rgba(148,163,184,.95)" }
        },
        y:{
          grid:{ color:"rgba(255,255,255,.04)" },
          ticks:{ color:"rgba(148,163,184,.95)" }
        }
      }
    }
  });
}

/* =========================================================
   EXCLUIR (por ID) – só superadmin
========================================================= */
async function excluir(id){
  if(role !== "superadmin"){
    toast("bad","Permissão","Somente superadmin pode excluir.");
    return;
  }

  if(!confirm("Excluir este usuário?")) return;

  try{
    const res = await fetch("/admin/excluir",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-admin-token":token
      },
      body: JSON.stringify({ id })
    });

    const data = await res.json().catch(()=>({}));

    if(!res.ok){
      toast("bad","Erro", data.erro || "Falha ao excluir.");
      return;
    }

    toast("ok","Excluído","Usuário removido com sucesso.");
    bumpBadge(1);
    // WS também vai atualizar, mas já atualiza aqui para responder rápido
    carregar(false);

  }catch(e){
    toast("bad","Erro","Falha de conexão ao excluir.");
  }
}

/* =========================================================
   LOGS (endpoint retorna ARRAY, não {logs})
========================================================= */
async function carregarLogs(forceToast=false){
  try{
    const res = await fetch("/admin/logs",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-admin-token":token
      }
    });

    if(res.status === 401){
      toast("bad","Sessão","Sessão inválida/expirada.");
      logout();
      return;
    }

    const logs = await res.json();
    const div = $("logs");
    div.innerHTML = "";

    if(!Array.isArray(logs) || logs.length === 0){
      div.innerHTML = `<div style="color:rgba(148,163,184,.95);padding:10px;">Sem logs ainda.</div>`;
      return;
    }

    logs.slice(0, 120).forEach(l=>{
      const data = escapeHtml(l.data || "");
      const tipo = escapeHtml(l.tipo || "");
      const roleLog = escapeHtml(l.role || "-");
      const ip = escapeHtml(l.ip || "-");
      const detalhes = escapeHtml(l.detalhes || "");

      div.innerHTML += `
        <div class="log">
          <div>
            <div class="t">${data}</div>
            <div><strong>${tipo}</strong> • role: ${roleLog} • ip: ${ip}</div>
            ${detalhes ? `<div style="opacity:.9;margin-top:2px;">${detalhes}</div>` : ``}
          </div>
          <div class="pill2">${roleLog}</div>
        </div>
      `;
    });

    if(forceToast) toast("ok","Logs","Logs carregados.");

  }catch(e){
    toast("bad","Erro","Falha ao carregar logs.");
  }
}

/* =========================================================
   LOGOUT
========================================================= */
function logout(){
  sessionStorage.clear();
  location.reload();
}
