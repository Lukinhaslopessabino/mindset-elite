<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindset Elite • Enterprise</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0A0F1C;
--card:#141C2E;
--accent:#635BFF;
--text:#EAF2FF;
--muted:#94A3B8;
--danger:#FF4D4D;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial}

body{
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* LOGIN */
.login-box{
width:400px;
background:var(--card);
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

.login-box h2{
margin-bottom:20px;
color:var(--accent);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#1F2937;
color:#fff;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.9;
}

.error{
color:var(--danger);
font-size:13px;
margin-top:10px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-box">
<h2>Mindset Enterprise Login</h2>

<div id="step1">
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Continuar</button>
</div>

<div id="step2" class="hidden">
<input type="text" id="codigo" placeholder="Código 2FA (6 dígitos)">
<button onclick="validar2FA()">Entrar</button>
</div>

<div id="errorMsg" class="error"></div>
</div>

<div id="dashboard" class="hidden">
<h1 style="text-align:center;">Dashboard carregado com sucesso 🚀</h1>
<button onclick="logout()">Logout</button>
</div>

<script>
let senhaTemp = null;
let token = sessionStorage.getItem("adminToken");

if(token){
mostrarDashboard();
}

async function login(){

const senha = document.getElementById("senha").value;
document.getElementById("errorMsg").innerText="";

const res = await fetch("https://mindset-elite.onrender.com/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({senha})
});

const data = await res.json();

if(data.precisa2FA){
senhaTemp = senha;
document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");
}else{
document.getElementById("errorMsg").innerText=data.erro || "Erro no login";
}
}

async function validar2FA(){

const codigo = document.getElementById("codigo").value;

const res = await fetch("https://mindset-elite.onrender.com/admin/2fa",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
senha:senhaTemp,
codigo
})
});

const data = await res.json();

if(data.token){
sessionStorage.setItem("adminToken",data.token);
sessionStorage.setItem("adminRole",data.role);
mostrarDashboard();
}else{
document.getElementById("errorMsg").innerText=data.erro || "Código inválido";
}
}

function mostrarDashboard(){
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
}

function logout(){
sessionStorage.clear();
location.reload();
}
</script>

</body>
</html>
