<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mindset Elite • Enterprise</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== ESTILO ORIGINAL MANTIDO ===== */
body{
  background:#0B1020;
  color:#EAF2FF;
  font-family:Inter,system-ui,Arial;
  margin:0;
}

header{
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#070A12;
}

.container{ padding:20px; }

button{
  padding:8px 12px;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.1);
}

.del{
  background:#FF4D4D;
  border:none;
  color:white;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111827;
  padding:12px;
  display:none;
}

.toast.show{ display:block; }
</style>
</head>

<body>

<header>
  <div>
    <strong>Mindset Enterprise</strong>
  </div>
  <div>
    <button onclick="resetarVagas()">Resetar Vagas</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

<h3>Total inscritos: <span id="mTotal">0</span></h3>
<h3>Vagas disponíveis: <span id="mVagas">0</span></h3>

<table>
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Idade</th>
<th>Telegram</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3>Logs</h3>
<div id="logs"></div>

</div>

<div class="toast" id="toast"></div>

<script>

/* =======================================================
   CONFIGURAÇÃO
======================================================= */

const API = "https://mindset-elite.onrender.com";
const WS_URL = "wss://mindset-elite.onrender.com";

let token = sessionStorage.getItem("adminToken");
let role = sessionStorage.getItem("adminRole");

if(!token){
  alert("Sessão inválida.");
  location.href = "login.html";
}

/* =======================================================
   WEBSOCKET (RENDER)
======================================================= */

let ws = new WebSocket(WS_URL);

ws.onopen = () => console.log("WS conectado");

ws.onmessage = (event)=>{
  const msg = JSON.parse(event.data);

  if(msg.type === "data_update"){
    carregar();
  }

  if(msg.type === "log_update"){
    carregarLogs();
  }
};

/* =======================================================
   TOAST
======================================================= */

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=> t.classList.remove("show"), 3000);
}

/* =======================================================
   CARREGAR INSCRITOS
======================================================= */

async function carregar(){

  const res = await fetch(API + "/admin/inscritos",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-token":token
    }
  });

  if(res.status === 401){
    alert("Sessão expirada.");
    logout();
    return;
  }

  const data = await res.json();

  document.getElementById("mTotal").innerText = data.inscritos.length;
  document.getElementById("mVagas").innerText = data.vagas;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.inscritos.forEach((u,i)=>{

    const btn = role === "superadmin"
      ? `<button class="del" onclick="excluir('${u.id}')">Excluir</button>`
      : `-`;

    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${u.nome}</td>
        <td>${u.idade}</td>
        <td>${u.telegram}</td>
        <td>${btn}</td>
      </tr>
    `;
  });
}

carregar();

/* =======================================================
   EXCLUIR
======================================================= */

async function excluir(id){

  if(!confirm("Excluir usuário?")) return;

  const res = await fetch(API + "/admin/excluir",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-token":token
    },
    body: JSON.stringify({ id })
  });

  if(!res.ok){
    toast("Erro ao excluir.");
    return;
  }

  toast("Usuário excluído.");
  carregar();
}

/* =======================================================
   RESETAR VAGAS
======================================================= */

async function resetarVagas(){

  if(role !== "superadmin"){
    toast("Sem permissão.");
    return;
  }

  const res = await fetch(API + "/admin/resetar-vagas",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-token":token
    }
  });

  if(!res.ok){
    toast("Erro ao resetar.");
    return;
  }

  toast("Vagas resetadas.");
  carregar();
}

/* =======================================================
   LOGS
======================================================= */

async function carregarLogs(){

  const res = await fetch(API + "/admin/logs",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-token":token
    }
  });

  const data = await res.json();

  const div = document.getElementById("logs");
  div.innerHTML = "";

  (data.logs || []).forEach(l=>{
    div.innerHTML += `
      <div>
        <strong>${l.tipo}</strong> - ${l.data}
      </div>
    `;
  });
}

carregarLogs();

/* =======================================================
   LOGOUT
======================================================= */

function logout(){
  sessionStorage.clear();
  location.href = "login.html";
}

</script>

</body>
</html>
