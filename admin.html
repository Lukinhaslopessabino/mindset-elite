<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Premium</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#0B1220;color:#fff;font-family:Arial;padding:30px}
.card{background:#111827;padding:20px;border-radius:10px;margin-bottom:20px}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.delete{background:red;color:#fff}
</style>
</head>
<body>

<h1>Admin Dashboard</h1>
<p id="roleInfo"></p>

<div class="card">
<input type="text" id="search" placeholder="Buscar...">
</div>

<div class="card">
<table width="100%" id="tabela">
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Idade</th>
<th>Telegram</th>
<th>Ação</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<canvas id="chart"></canvas>

<script>
let token=sessionStorage.getItem("adminToken");
let role=sessionStorage.getItem("adminRole");
let lista=[];
let chart;

/* LOGIN SIMPLES */
if(!token){
let senha=prompt("Senha admin:");
fetch("https://mindset-elite.onrender.com/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({senha})
})
.then(r=>r.json())
.then(data=>{
if(data.token){
sessionStorage.setItem("adminToken",data.token);
sessionStorage.setItem("adminRole",data.role);
location.reload();
}else{
alert("Login inválido");
location.reload();
}
});
}else{
document.getElementById("roleInfo").innerText="Nível: "+role;
}

/* CARREGAR */
async function carregar(){

const res=await fetch("https://mindset-elite.onrender.com/admin/inscritos",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":token
}
});

if(res.status===401){logout();return;}

const data=await res.json();
lista=data.inscritos;
render();
grafico();
}

carregar();

/* AUTO UPDATE A CADA 10s */
setInterval(carregar,10000);

/* BUSCA */
document.getElementById("search").addEventListener("input",render);

function render(){

let filtro=document.getElementById("search").value.toLowerCase();
let tbody=document.querySelector("#tabela tbody");
tbody.innerHTML="";

lista
.filter(u=>u.nome.toLowerCase().includes(filtro) || u.telegram.toLowerCase().includes(filtro))
.forEach((u,i)=>{

let botao = role==="superadmin"
? `<button class="delete" onclick="excluir('${u.id}')">Excluir</button>`
: `Sem permissão`;

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${u.nome}</td>
<td>${u.idade}</td>
<td>${u.telegram}</td>
<td>${botao}</td>
</tr>`;
});
}

/* EXCLUIR */
async function excluir(id){

if(role!=="superadmin"){
alert("Permissão negada");
return;
}

await fetch("https://mindset-elite.onrender.com/admin/excluir",{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-admin-token":token
},
body:JSON.stringify({id})
});

carregar();
}

/* GRÁFICO */
function grafico(){

let dias={};

lista.forEach(u=>{
let dia=new Date(u.data).toLocaleDateString();
dias[dia]=(dias[dia]||0)+1;
});

if(chart)chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:Object.keys(dias),
datasets:[{
label:"Inscrições por dia",
data:Object.values(dias),
borderColor:"#00F5FF",
backgroundColor:"rgba(0,245,255,.1)",
fill:true
}]
}
});
}

function logout(){
sessionStorage.clear();
location.reload();
}
</script>

</body>
</html>
