<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inscrição - Mindset Elite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="global.css">

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>

<style>

/* CENTRALIZAÇÃO */
.form-wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:70vh;
}

/* FORM BOX */
.form-box{
  background:var(--panel);
  backdrop-filter:blur(18px);
  padding:50px;
  border-radius:var(--radius-xl);
  width:100%;
  max-width:480px;
  border:1px solid var(--stroke);
  box-shadow:var(--shadow-1);
  transition:.3s;
}

.form-box:hover{
  box-shadow:var(--shadow-2);
}

/* TÍTULO */
.page-title{
  text-align:center;
  margin-bottom:10px;
  font-size:26px;
}

/* VAGAS */
.vagas{
  text-align:center;
  margin-bottom:25px;
  font-size:14px;
  color:#00FFAA;
}

/* INPUTS */
input{
  width:100%;
  padding:15px;
  margin-bottom:16px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:#0c1220;
  color:#fff;
  font-size:14px;
  transition:.2s;
}

input:focus{
  outline:none;
  box-shadow:0 0 18px var(--cyan);
  border-color:var(--cyan);
}

/* BOTÃO */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:18px;
  font-weight:900;
  background:linear-gradient(90deg,var(--cyan),#00aaff,var(--cyan));
  color:#000;
  cursor:pointer;
  transition:.3s;
  position:relative;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-2);
}

button:disabled{
  background:#333;
  color:#777;
  cursor:not-allowed;
}

/* LOADER */
.loader{
  display:none;
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  border:3px solid #000;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:translateY(-50%) rotate(0deg);}
  100%{transform:translateY(-50%) rotate(360deg);}
}

#formMsg{
  margin-top:14px;
  text-align:center;
  min-height:22px;
  font-size:14px;
}

.honeypot{display:none;}

@media(max-width:768px){
  .form-box{
    padding:30px;
  }
}

</style>
</head>

<body>

<!-- NAV DESKTOP -->
<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">

  <div class="form-wrapper">

    <div class="form-box">

      <h1 class="holo-title page-title">Inscrição Oficial</h1>

      <div class="vagas" id="vagasInfo">Carregando vagas...</div>

      <form id="signupForm">

        <input type="text" id="telegram" placeholder="@SeuTelegram" required>
        <input type="text" id="nome" placeholder="Seu Nome" required>
        <input type="number" id="idade" placeholder="Sua Idade" required>

        <input type="text" id="hp" class="honeypot" autocomplete="off">

        <button type="submit">
          Enviar Inscrição
          <div class="loader" id="loader"></div>
        </button>

        <div style="margin-top:20px;text-align:center">
          <div class="g-recaptcha"
          data-sitekey="6LefpnEsAAAAAE46Eao6qyQQL_6nGBT08Dc3pGTo"></div>
        </div>

        <p id="formMsg"></p>

      </form>

    </div>

  </div>

</div>

<!-- FOOTER MOBILE -->
<div class="app-footer">
  <a href="index.html">🏠<br>Início</a>
  <a href="membros.html">👑<br>Membros</a>
  <a href="videos.html">🎬<br>Vídeos</a>
  <a href="links.html">🔗<br>Links</a>
</div>

<script>
const pageLoadedAt = Date.now();

async function carregarVagas(){
  try{
    const res=await fetch("https://mindset-elite.onrender.com/vagas",{cache:"no-store"});
    const data=await res.json();
    const el=document.getElementById("vagasInfo");
    el.innerText = data.vagas <= 0 ? "❌ Vagas esgotadas" : "Vagas restantes: "+data.vagas;
  }catch{
    document.getElementById("vagasInfo").innerText="Erro ao carregar vagas.";
  }
}
carregarVagas();

const form=document.getElementById("signupForm");
const formMsg=document.getElementById("formMsg");
const loader=document.getElementById("loader");
const button=form.querySelector("button");

let enviando=false;

form.addEventListener("submit",async(e)=>{
e.preventDefault();
if(enviando) return;

formMsg.innerText="";
formMsg.style.color="#FF4C4C";

const token=grecaptcha.getResponse();
if(!token){
  formMsg.innerText="Confirme o reCAPTCHA.";
  return;
}

const telegram=document.getElementById("telegram").value.trim();
const nome=document.getElementById("nome").value.trim();
const idade=parseInt(document.getElementById("idade").value);
const hp=document.getElementById("hp").value;

if(hp){ return; }

if(nome.length<2){ formMsg.innerText="Nome inválido."; return; }
if(!telegram.startsWith("@")){ formMsg.innerText="Telegram deve começar com @"; return; }
if(idade<16){ formMsg.innerText="Idade mínima 16 anos."; return; }

loader.style.display="block";
button.disabled=true;
enviando=true;

try{
const res=await fetch("https://mindset-elite.onrender.com/inscrever",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ nome, idade, telegram, token, hp, ts:pageLoadedAt })
});

const data=await res.json();

if(!res.ok){
  formMsg.innerText=data.erro || "Erro no envio.";
}else{
  formMsg.style.color="#00FFAA";
  formMsg.innerText="✅ Inscrição confirmada!";
  form.reset();
  grecaptcha.reset();
  carregarVagas();
}

}catch{
  formMsg.innerText="Erro de conexão.";
}

loader.style.display="none";
button.disabled=false;
enviando=false;
});
</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
