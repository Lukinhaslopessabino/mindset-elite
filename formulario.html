<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Inscrição - Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --mobile-nav-height:78px;
  --bg-primary:#05070d;
  --text-primary:#ffffff;
  --accent:#00F5FF;
  --green:#00FFAA;
  --danger:#FF4C4C;
}

body{
  font-family:'Orbitron',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .4s ease,color .4s ease;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:16px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:var(--text-primary);
  text-decoration:none;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  transition:.2s;
}

.navbar a:hover{
  background:var(--accent);
  color:#000;
}

/* CONTAINER */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:150px 20px 140px;
}

/* FORM BOX (Glass real) */
.form-box{
  background:rgba(15,20,35,.75);
  backdrop-filter:blur(18px);
  padding:50px;
  border-radius:24px;
  width:100%;
  max-width:460px;
  border:1px solid var(--accent);
  box-shadow:0 0 60px rgba(0,0,0,.35);
  transition:.3s;
}

.form-box:hover{
  box-shadow:0 0 90px var(--accent);
}

h1{
  text-align:center;
  margin-bottom:10px;
  font-size:26px;
  background:linear-gradient(90deg,var(--accent),#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.vagas{
  text-align:center;
  margin-bottom:25px;
  font-size:14px;
  color:var(--green);
}

/* INPUTS */
input{
  width:100%;
  padding:15px;
  margin-bottom:16px;
  border-radius:14px;
  border:1px solid var(--accent);
  background:#0c1220;
  color:#fff;
  font-size:14px;
  transition:.2s;
}

input:focus{
  outline:none;
  box-shadow:0 0 18px var(--accent);
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:18px;
  font-weight:900;
  background:linear-gradient(90deg,var(--accent),#00aaff,var(--accent));
  background-size:200%;
  color:#000;
  cursor:pointer;
  transition:.3s;
  position:relative;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 35px var(--accent);
}

button:disabled{
  background:#333;
  color:#777;
  cursor:not-allowed;
}

/* LOADER */
.loader{
  display:none;
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  height:18px;
  border:3px solid #000;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:translateY(-50%) rotate(0deg);}
  100%{transform:translateY(-50%) rotate(360deg);}
}

#formMsg{
  margin-top:14px;
  text-align:center;
  min-height:22px;
  font-size:14px;
}

.honeypot{display:none;}

/* MOBILE */
@media(max-width:768px){

  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 5px calc(10px + env(safe-area-inset-bottom));
  }

  .navbar a{
    font-size:11px;
    padding:6px;
  }

  .container{
    padding:100px 15px 120px;
  }

  .form-box{
    padding:30px;
  }

  h1{font-size:20px;}
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">
<div class="form-box">

<h1>Inscrição Oficial</h1>
<div class="vagas" id="vagasInfo">Carregando vagas...</div>

<form id="signupForm">

<input type="text" id="telegram" placeholder="@SeuTelegram" required>
<input type="text" id="nome" placeholder="Seu Nome" required>
<input type="number" id="idade" placeholder="Sua Idade" required>

<input type="text" id="hp" class="honeypot" autocomplete="off">

<button type="submit">
Enviar Inscrição
<div class="loader" id="loader"></div>
</button>

<div style="margin-top:20px;text-align:center">
<div class="g-recaptcha"
data-sitekey="6LefpnEsAAAAAE46Eao6qyQQL_6nGBT08Dc3pGTo"></div>
</div>

<p id="formMsg"></p>

</form>
</div>
</div>

<script>
const pageLoadedAt = Date.now();

async function carregarVagas(){
  try{
    const res=await fetch("https://mindset-elite.onrender.com/vagas",{cache:"no-store"});
    const data=await res.json();
    const el=document.getElementById("vagasInfo");
    el.innerText = data.vagas <= 0 ? "❌ Vagas esgotadas" : "Vagas restantes: "+data.vagas;
  }catch{
    document.getElementById("vagasInfo").innerText="Erro ao carregar vagas.";
  }
}
carregarVagas();

const form=document.getElementById("signupForm");
const formMsg=document.getElementById("formMsg");
const loader=document.getElementById("loader");
const button=form.querySelector("button");

let enviando=false;

form.addEventListener("submit",async(e)=>{
e.preventDefault();
if(enviando) return;

formMsg.innerText="";
formMsg.style.color="var(--danger)";

const token=grecaptcha.getResponse();
if(!token){
  formMsg.innerText="Confirme o reCAPTCHA.";
  return;
}

const telegram=document.getElementById("telegram").value.trim();
const nome=document.getElementById("nome").value.trim();
const idade=parseInt(document.getElementById("idade").value);
const hp=document.getElementById("hp").value;

if(hp){ return; }

if(nome.length<2){ formMsg.innerText="Nome inválido."; return; }
if(!telegram.startsWith("@")){ formMsg.innerText="Telegram deve começar com @"; return; }
if(idade<16){ formMsg.innerText="Idade mínima 16 anos."; return; }

loader.style.display="block";
button.disabled=true;
enviando=true;

try{
const res=await fetch("https://mindset-elite.onrender.com/inscrever",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ nome, idade, telegram, token, hp, ts:pageLoadedAt })
});

const data=await res.json();

if(!res.ok){
  formMsg.innerText=data.erro || "Erro no envio.";
}else{
  formMsg.style.color="var(--green)";
  formMsg.innerText="✅ Inscrição confirmada!";
  form.reset();
  grecaptcha.reset();
  carregarVagas();
}

}catch{
  formMsg.innerText="Erro de conexão.";
}

loader.style.display="none";
button.disabled=false;
enviando=false;
});
</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
