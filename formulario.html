<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição • Mindset Elite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        .container { padding-top: 140px; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .form-box {
            background: rgba(17, 24, 39, 0.95);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        .page-title {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--primary);
            letter-spacing: 1px;
        }
        .vagas {
            text-align: center;
            margin-bottom: 30px;
            font-size: 13px;
            font-weight: 700;
            color: #00ffaa;
            text-transform: uppercase;
        }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-soft);
            font-size: 16px;
        }
        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0f172a;
            color: #fff;
            font-size: 14px;
            transition: 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 224, 255, 0.2);
            background: #161e31;
        }
        .btn-submit {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            background: var(--primary);
            color: #000;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-submit:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--primary-soft);
        }
        .btn-submit:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #formMsg {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            min-height: 20px;
        }
        .honeypot { display: none !important; }
        .captcha-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            transform: scale(0.9);
        }
        @media(max-width: 480px) {
            .form-box { padding: 25px; border-radius: 0; border: none; background: transparent; box-shadow: none; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">MINDSET ELITE</div>
    <div class="nav-links">
        <a href="index.html">Início</a>
        <a href="membros.html">Membros</a>
        <a href="participantes.html">Participantes</a>
        <a href="videos.html">Vídeos</a>
    </div>
</nav>

<div class="container">
    <div class="form-box">
        <h1 class="page-title text-gradient">Recrutamento</h1>
        <div class="vagas" id="vagasInfo">Sincronizando...</div>

        <form id="signupForm">
            <div class="input-group">
                <i class="fa-brands fa-telegram"></i>
                <input type="text" id="telegram" placeholder="@seu_usuario" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-signature"></i>
                <input type="text" id="nome" placeholder="Nome Completo" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="number" id="idade" placeholder="Sua Idade" min="16" max="99" required>
            </div>

            <input type="text" id="hp" class="honeypot" autocomplete="off">

            <div class="captcha-container">
                <div class="g-recaptcha" data-theme="dark" data-sitekey="6LefpnEsAAAAAE46Eao6qyQQL_6nGBT08Dc3pGTo"></div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span>Enviar Dados</span>
                <div class="loader" id="loader"></div>
            </button>

            <p id="formMsg"></p>
        </form>
    </div>
</div>

<div class="app-footer">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="membros.html"><i class="fa-solid fa-crown"></i><span>Membros</span></a>
    <a href="videos.html"><i class="fa-solid fa-play"></i><span>Vídeos</span></a>
    <a href="links.html"><i class="fa-solid fa-link"></i><span>Links</span></a>
</div>

<script>
// CONFIGURAÇÃO DA API - Altere aqui se o link do Render mudar
const API_BASE_URL = "https://mindset-elite.onrender.com";
const pageLoadedAt = Date.now();
let enviando = false;

async function carregarVagas() {
    const el = document.getElementById("vagasInfo");
    const btn = document.getElementById("submitBtn");
    try {
        const res = await fetch(`${API_BASE_URL}/vagas`, { cache: "no-store" });
        const data = await res.json();
        const v = data.vagas ?? 0;
        
        if (v <= 0) {
            el.innerHTML = '<span style="color:#ff4c4c">⚠️ Inscrições Encerradas</span>';
            btn.disabled = true;
            btn.innerText = "SEM VAGAS";
        } else {
            el.innerText = `Slots Disponíveis: ${v}`;
        }
    } catch {
        el.innerText = "Servidor Offline";
    }
}

// Inicializa vagas ao carregar
carregarVagas();

const form = document.getElementById("signupForm");
const formMsg = document.getElementById("formMsg");
const loader = document.getElementById("loader");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (enviando) return;

    const captchaToken = grecaptcha.getResponse();
    if (!captchaToken) {
        formMsg.style.color = "#ffcc00";
        formMsg.innerText = "Por favor, valide o reCAPTCHA.";
        return;
    }

    const payload = {
        telegram: document.getElementById("telegram").value.trim(),
        nome: document.getElementById("nome").value.trim(),
        idade: parseInt(document.getElementById("idade").value),
        hp: document.getElementById("hp").value,
        token: captchaToken
    };

    // Validação de formato de Telegram
    if (!payload.telegram.startsWith("@")) {
        formMsg.style.color = "#ff4c4c";
        formMsg.innerText = "O Telegram deve começar com @";
        return;
    }

    // Interface de carregamento
    loader.style.display = "block";
    btn.disabled = true;
    enviando = true;
    formMsg.innerText = "Enviando para o servidor...";
    formMsg.style.color = "var(--primary)";

    try {
        const res = await fetch(`${API_BASE_URL}/inscrever`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
            formMsg.style.color = "#ff4c4c";
            formMsg.innerText = data.erro || "Falha na inscrição.";
            grecaptcha.reset();
        } else {
            formMsg.style.color = "#00ffaa";
            formMsg.innerText = "✅ SUCESSO! Verifique seu Telegram em breve.";
            form.reset();
            grecaptcha.reset();
            carregarVagas(); // Atualiza contador de vagas na tela
        }
    } catch (err) {
        formMsg.style.color = "#ff4c4c";
        formMsg.innerText = "Erro de conexão com a HQ.";
        console.error(err);
    } finally {
        loader.style.display = "none";
        btn.disabled = false;
        enviando = false;
    }
});
</script>

<script src="layout.v3.js" defer></script>
</body>
</html>
