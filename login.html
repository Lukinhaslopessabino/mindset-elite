<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito • Mindset Elite</title>
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #0a0f1c 0%, #050a15 100%);
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            padding: 40px;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card i.main-icon {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        h2 {
            margin-bottom: 10px;
            font-size: 22px;
            color: #fff;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glass);
            background: rgba(15, 23, 42, 0.6);
            color: #fff;
            font-size: 15px;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 15px rgba(0, 224, 255, 0.1);
        }

        .btn-login {
            width: 100%;
            margin-top: 10px;
        }

        #msg {
            margin-top: 20px;
            font-size: 13px;
            min-height: 20px;
            color: #ff4d4d;
            font-weight: 500;
        }

        .footer-brand {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <i class="fa-solid fa-shield-halved main-icon"></i>
        <h2>Admin Login</h2>
        <p class="subtitle">Acesso exclusivo para administradores Elite</p>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="senha" placeholder="Sua senha mestre">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-key"></i>
            <input type="text" id="codigo" placeholder="Código 2FA">
        </div>

        <button class="btn btn-login" onclick="login()" id="btnLogin">
            <i class="fa-solid fa-right-to-bracket"></i> Autenticar
        </button>

        <div id="msg"></div>

        <div class="footer-brand">Mindset Enterprise v3.0</div>
    </div>

    <script>
        const API = "https://mindset-elite.onrender.com";

        async function login() {
            const senha = document.getElementById("senha").value.trim();
            const codigo = document.getElementById("codigo").value.trim();
            const msg = document.getElementById("msg");
            const btn = document.getElementById("btnLogin");

            msg.innerText = "";

            if (!senha || !codigo) {
                msg.innerText = "Preencha todos os campos para continuar.";
                return;
            }

            // Efeito de Loading no Botão
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processando...';

            try {
                const res = await fetch(API + "/admin/2fa", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ senha, codigo })
                });

                const data = await res.json();

                if (!res.ok) {
                    msg.innerText = data.erro || "Falha na autenticação.";
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Autenticar';
                    return;
                }

                // Armazenamento Seguro
                sessionStorage.setItem("adminToken", data.token);
                sessionStorage.setItem("adminRole", data.role);

                // Feedback de Sucesso antes de redirecionar
                msg.style.color = "var(--primary)";
                msg.innerText = "Acesso autorizado. Redirecionando...";
                
                setTimeout(() => {
                    window.location.href = "admin.html";
                }, 800);

            } catch (e) {
                msg.innerText = "Erro crítico: Sem resposta do servidor.";
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Autenticar';
            }
        }

        // Permitir Login com a tecla Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>

</body>
</html>
