<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Vídeos - Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --cyan:#00F5FF;
  --green:#00FFAA;
  --mobile-nav-height:78px;
}

body{
  font-family:'Orbitron',sans-serif;
  background:transparent;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:16px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(15px);
  z-index:1000;
}
.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  transition:.2s;
}
.navbar a:hover{background:var(--cyan);color:#000}

/* PAGE */
.container{
  padding:140px 30px 140px;
  max-width:1300px;
  margin:auto;
  position:relative;
  z-index:1;
}

h1{
  font-size:26px;
  margin-bottom:20px;
  background:linear-gradient(90deg,var(--cyan),#fff,var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ROW */
.row{
  display:flex;
  gap:18px;
  overflow-x:auto;
  padding:20px 0;
  scrollbar-width:none;
}
.row::-webkit-scrollbar{display:none}

/* CARD */
.card{
  min-width:260px;
  position:relative;
}

.card-inner{
  background:rgba(15,20,35,.75);
  border:1px solid rgba(0,153,255,.25);
  border-radius:14px;
  overflow:hidden;
  transition:.3s;
  cursor:pointer;
  position:relative;
}

.card-inner:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px rgba(0,153,255,.35);
  z-index:5;
}

/* THUMB */
.thumb{
  position:relative;
  height:150px;
  overflow:hidden;
}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.preview{
  position:absolute;
  inset:0;
  opacity:0;
  transition:.2s;
}
.preview iframe{
  width:100%;
  height:100%;
  border:none;
}
.card-inner:hover .preview{opacity:1}
.card-inner:hover img{opacity:0}

/* Volume Button */
.volume-btn{
  position:absolute;
  bottom:8px;
  right:8px;
  background:rgba(0,0,0,.6);
  border:none;
  color:#fff;
  padding:6px;
  border-radius:50%;
  cursor:pointer;
  font-size:12px;
}

/* Footer */
.strip{
  padding:10px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
}

/* FAVORITE */
.fav-btn{
  cursor:pointer;
  font-size:14px;
}

/* Skeleton */
.skeleton{
  min-width:260px;
  height:190px;
  border-radius:14px;
  background:linear-gradient(90deg,#1a1f2e 25%,#222 50%,#1a1f2e 75%);
  background-size:200% 100%;
  animation:loading 1.2s infinite;
}
@keyframes loading{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}
#modal.show{display:flex}
.modal-video{
  width:90%;
  max-width:900px;
  position:relative;
  padding-bottom:56.25%;
}
.modal-video iframe{
  position:absolute;
  width:100%;
  height:100%;
  border:none;
}
.close-btn{
  position:absolute;
  top:-40px;
  right:0;
  background:var(--cyan);
  border:none;
  padding:8px 12px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">
<h1>Streaming Mindset Elite</h1>

<h3>▶ Continue Assistindo</h3>
<div class="row" id="continueRow"></div>

<h3>⭐ Minha Lista</h3>
<div class="row" id="favRow"></div>

<h3>🔥 Catálogo</h3>
<div class="row" id="mainRow"></div>
</div>

<div id="modal">
  <div class="modal-video">
    <button class="close-btn">Fechar</button>
    <iframe id="modalIframe" allow="autoplay" allowfullscreen></iframe>
  </div>
</div>

<script>

const videos=[
"https://youtube.com/shorts/lS8Sdam5pEA",
"https://youtube.com/shorts/v_s2bz8T3a8",
"https://youtube.com/shorts/g-BJOYE_Zj8"
];

const mainRow=document.getElementById("mainRow");
const continueRow=document.getElementById("continueRow");
const favRow=document.getElementById("favRow");

function getID(url){
 if(url.includes("shorts/")) return url.split("shorts/")[1];
 if(url.includes("watch?v=")) return url.split("watch?v=")[1];
}

function embed(id,mute=true){
 return `https://www.youtube.com/embed/${id}?${mute?"mute=1":""}&controls=0&rel=0`;
}

function createCard(url){
 const id=getID(url);
 const favKey="fav_"+id;
 const contKey="cont_"+id;
 let isFav=localStorage.getItem(favKey)==="1";

 const card=document.createElement("div");
 card.className="card";

 card.innerHTML=`
  <div class="card-inner">
    <div class="thumb">
      <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
      <div class="preview">
        <iframe src="${embed(id,true)}"></iframe>
      </div>
      <button class="volume-btn">🔇</button>
    </div>
    <div class="strip">
      <span>${id}</span>
      <span class="fav-btn">${isFav?"⭐":"☆"}</span>
    </div>
  </div>
 `;

 const iframe=card.querySelector("iframe");
 const volBtn=card.querySelector(".volume-btn");
 const favBtn=card.querySelector(".fav-btn");

 let muted=true;

 card.querySelector(".card-inner").addEventListener("mouseenter",()=>{
   iframe.src=embed(id,true)+"&autoplay=1";
   setTimeout(()=>iframe.src=embed(id,true),3000);
 });

 volBtn.onclick=(e)=>{
   e.stopPropagation();
   muted=!muted;
   iframe.src=embed(id,!muted)+"&autoplay=1";
   volBtn.innerText=muted?"🔇":"🔊";
 };

 favBtn.onclick=(e)=>{
   e.stopPropagation();
   isFav=!isFav;
   localStorage.setItem(favKey,isFav?"1":"0");
   favBtn.innerText=isFav?"⭐":"☆";
   renderFav();
 };

 card.querySelector(".card-inner").onclick=()=>{
   document.getElementById("modal").classList.add("show");
   document.getElementById("modalIframe").src=embed(id,false)+"&autoplay=1";
   localStorage.setItem(contKey,"1");
   renderContinue();
 };

 return card;
}

function renderMain(){
 mainRow.innerHTML="";
 videos.forEach(v=>mainRow.appendChild(createCard(v)));
}

function renderContinue(){
 continueRow.innerHTML="";
 videos.forEach(v=>{
   const id=getID(v);
   if(localStorage.getItem("cont_"+id)==="1"){
     continueRow.appendChild(createCard(v));
   }
 });
}

function renderFav(){
 favRow.innerHTML="";
 videos.forEach(v=>{
   const id=getID(v);
   if(localStorage.getItem("fav_"+id)==="1"){
     favRow.appendChild(createCard(v));
   }
 });
}

/* Skeleton loading */
function showSkeleton(){
 for(let i=0;i<3;i++){
   mainRow.appendChild(document.createElement("div")).className="skeleton";
 }
}
showSkeleton();

setTimeout(()=>{
 mainRow.innerHTML="";
 renderMain();
 renderContinue();
 renderFav();
},1000);

document.querySelector(".close-btn").onclick=()=>{
 document.getElementById("modal").classList.remove("show");
 document.getElementById("modalIframe").src="";
};

</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
