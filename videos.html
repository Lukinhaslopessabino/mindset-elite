<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Vídeos - Mindset Elite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="global.css">

<style>

/* TÍTULO */
.page-title{
  font-size:32px;
  margin-bottom:30px;
}

/* ROW WRAPPER */
.row-wrapper{
  position:relative;
  overflow:hidden;
  border-radius:18px;
}

/* FADE EDGES */
.row-wrapper::before,
.row-wrapper::after{
  content:"";
  position:absolute;
  top:0;
  width:120px;
  height:100%;
  z-index:10;
  pointer-events:none;
}
.row-wrapper::before{
  left:0;
  background:linear-gradient(to right,var(--bg1) 0%,transparent 100%);
}
.row-wrapper::after{
  right:0;
  background:linear-gradient(to left,var(--bg1) 0%,transparent 100%);
}

/* ROW */
.row{
  display:flex;
  gap:18px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:40px 0;
  perspective:1100px;
}
.row::-webkit-scrollbar{display:none}

/* BOTÕES */
.scroll-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:60px;
  height:95px;
  background:rgba(0,0,0,.65);
  border:1px solid var(--stroke);
  color:#fff;
  font-size:32px;
  cursor:pointer;
  z-index:20;
  backdrop-filter:blur(10px);
  opacity:0;
  transition:.25s;
}
.row-wrapper:hover .scroll-btn{opacity:1}

.scroll-btn:hover{
  background:var(--cyan);
  color:#000;
  box-shadow:var(--shadow-2);
}

.scroll-left{left:0;border-radius:0 14px 14px 0}
.scroll-right{right:0;border-radius:14px 0 0 14px}

/* CARD */
.card{
  min-width:270px;
  max-width:270px;
  transform-style:preserve-3d;
}

.card-inner{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:var(--radius-lg);
  overflow:hidden;
  transition:transform .3s ease, box-shadow .3s ease;
}

.card.is-hover .card-inner{
  transform:translateZ(60px) scale(1.16);
  box-shadow:var(--shadow-2);
  border-color:var(--cyan);
}

/* THUMB */
.thumb{height:155px;overflow:hidden;position:relative}
.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.3s;
}
.preview{
  position:absolute;
  inset:0;
  opacity:0;
  transition:.3s;
}
.preview iframe{width:100%;height:100%;border:none}

.card.is-hover img{opacity:0}
.card.is-hover .preview{opacity:1}

.strip{
  padding:12px;
  text-align:center;
  font-size:12px;
  opacity:.85;
}

/* CURSOR TRAIL */
#cursorTrail,#cursorAura{display:none}

@media(min-width:769px){
  #cursorTrail,#cursorAura{display:block}
}

#cursorTrail{
  position:fixed;
  width:24px;height:24px;
  border-radius:50%;
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--cyan),transparent 70%);
  opacity:0;
}
#cursorAura{
  position:fixed;
  width:180px;height:180px;
  border-radius:50%;
  pointer-events:none;
  z-index:99998;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(0,245,255,.15),transparent 60%);
  opacity:0;
}

@media(max-width:768px){
  .scroll-btn{display:none}
}

</style>
</head>

<body>

<div id="cursorAura"></div>
<div id="cursorTrail"></div>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">

  <h1 class="holo-title page-title">Streaming Mindset Elite</h1>

  <div class="row-wrapper" id="rowWrap">
    <button class="scroll-btn scroll-left" id="btnLeft">‹</button>
    <div class="row" id="mainRow"></div>
    <button class="scroll-btn scroll-right" id="btnRight">›</button>
  </div>

</div>

<div class="app-footer">
  <a href="index.html">🏠<br>Início</a>
  <a href="membros.html">👑<br>Membros</a>
  <a href="videos.html">🎬<br>Vídeos</a>
  <a href="links.html">🔗<br>Links</a>
</div>

<script>

/* =========================
   LISTA DE VÍDEOS
========================= */
const videos=[
  "https://youtube.com/shorts/lS8Sdam5pEA",
  "https://youtube.com/shorts/v_s2bz8T3a8",
  "https://youtube.com/shorts/g-BJOYE_Zj8",
  "https://youtube.com/shorts/OJMOJnKw77g",
  "https://youtube.com/shorts/NSSgs-AH9vc",
  "https://youtube.com/shorts/pX0lkVI1dkg",
  "https://youtube.com/shorts/CWGaPBbQI6M",
  "https://youtube.com/shorts/QTNoH8Gpho8",
  "https://youtube.com/shorts/lxOMW7GOn44",
  "https://youtube.com/shorts/wYi4Zvc6uuk",
  "https://youtube.com/shorts/tfh5HmCJS0w",
  "https://youtube.com/shorts/37D3nHE0Eac"
];

const mainRow=document.getElementById("mainRow");
const btnLeft=document.getElementById("btnLeft");
const btnRight=document.getElementById("btnRight");

function getID(url){
  return url.split("shorts/")[1].split("?")[0];
}
function embed(id){
  return `https://www.youtube.com/embed/${id}?mute=1&controls=0&rel=0&autoplay=1&playsinline=1`;
}

function createCard(url){
  const id=getID(url);
  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <div class="card-inner">
      <div class="thumb">
        <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
        <div class="preview">
          <iframe src="${embed(id)}"></iframe>
        </div>
      </div>
      <div class="strip">${id}</div>
    </div>
  `;

  card.addEventListener("mouseenter",()=>card.classList.add("is-hover"));
  card.addEventListener("mouseleave",()=>card.classList.remove("is-hover"));

  return card;
}

videos.forEach(v=>mainRow.appendChild(createCard(v)));

btnLeft.onclick=()=>mainRow.scrollBy({left:-520,behavior:"smooth"});
btnRight.onclick=()=>mainRow.scrollBy({left:520,behavior:"smooth"});

/* CURSOR TRAIL */
const trail=document.getElementById("cursorTrail");
const aura=document.getElementById("cursorAura");
let tx=0,ty=0,cx=0,cy=0,ax=0,ay=0;

function animate(){
  cx+=(tx-cx)*.2;
  cy+=(ty-cy)*.2;
  ax+=(tx-ax)*.08;
  ay+=(ty-ay)*.08;

  trail.style.left=cx+"px";
  trail.style.top=cy+"px";
  aura.style.left=ax+"px";
  aura.style.top=ay+"px";

  requestAnimationFrame(animate);
}
animate();

document.addEventListener("mousemove",(e)=>{
  tx=e.clientX; ty=e.clientY;
  trail.style.opacity=1;
  aura.style.opacity=1;
});

</script>

<script src="layout.v3.js" defer></script>
</body>
</html>
