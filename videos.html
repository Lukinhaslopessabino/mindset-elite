<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeos - Mindset Elite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Orbitron',sans-serif;
  background:#05070d;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(15px);
  z-index:1000;
}
.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 16px;
  border-radius:25px;
  transition:.3s;
  font-size:14px;
}
.navbar a:hover{
  background:#00F5FF;
  color:#000;
  box-shadow:0 0 20px #00F5FF;
}
.container{
  padding:150px 5% 120px;
  max-width:1400px;
  margin:auto;
}
h1{
  text-align:center;
  margin-bottom:60px;
  font-size:clamp(1.8rem,4vw,3rem);
  background:linear-gradient(90deg,#00F5FF,#fff,#00F5FF);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:35px;
}
.video-card{
  background:rgba(15,20,35,0.95);
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,153,255,.25);
  transition:.4s;
  opacity:0;
  transform:translateY(30px);
  position:relative;
}
.video-card.show{
  opacity:1;
  transform:translateY(0);
  transition:all .8s ease;
}
.video-card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 50px rgba(0,153,255,.7);
}
.video-wrapper{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
}
.video-wrapper iframe{
  position:absolute;
  width:100%;
  height:100%;
  border:none;
}
.video-footer{
  padding:15px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:.8;
}
@media(max-width:768px){
  body{padding-bottom:100px;}
  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:12px 0;
    border-top:1px solid rgba(0,153,255,.4);
  }
  .container{
    padding:100px 15px 150px;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">
<h1>Plataforma Oficial de Vídeos 🚀</h1>
<div class="video-grid" id="videoGrid"></div>
</div>

<script>

/* 🔥 COLE LINK NORMAL DO YOUTUBE AQUI */
const videos = [
"https://youtube.com/shorts/lS8Sdam5pEA",
"https://youtube.com/shorts/v_s2bz8T3a8",
"https://youtube.com/shorts/g-BJOYE_Zj8",
"https://youtube.com/shorts/OJMOJnKw77g",
"https://youtube.com/shorts/NSSgs-AH9vc",
"https://youtube.com/shorts/pX0lkVI1dkg",
"https://youtube.com/shorts/CWGaPBbQI6M",
"https://youtube.com/shorts/QTNoH8Gpho8",
"https://youtube.com/shorts/lxOMW7GOn44",
"https://youtube.com/shorts/wYi4Zvc6uuk",
"https://youtube.com/shorts/tfh5HmCJS0w",
"https://youtube.com/shorts/37D3nHE0Eac"
];

/* 🔥 CONVERTE AUTOMATICAMENTE SHORTS OU WATCH PARA EMBED */
function converterParaEmbed(url){
  if(url.includes("shorts/")){
    const id = url.split("shorts/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id;
  }
  if(url.includes("watch?v=")){
    const id = url.split("watch?v=")[1].split("&")[0];
    return "https://www.youtube.com/embed/" + id;
  }
  return url;
}

const grid = document.getElementById("videoGrid");

videos.forEach((link,index)=>{

  const embedUrl = converterParaEmbed(link);

  const viewsKey = "views_" + embedUrl;
  let views = parseInt(localStorage.getItem(viewsKey)) || 0;

  const card = document.createElement("div");
  card.className="video-card";

  card.innerHTML = `
    <div class="video-wrapper">
      <iframe loading="lazy"
      allowfullscreen
      src="${embedUrl}">
      </iframe>
    </div>
    <div class="video-footer">
      <span class="views">👁️ ${views} views</span>
      <span style="color:#00FFAA">Disponível</span>
    </div>
  `;

  grid.appendChild(card);

  setTimeout(()=>card.classList.add("show"), index*100);

  card.addEventListener("click",()=>{
    views++;
    localStorage.setItem(viewsKey, views);
    card.querySelector(".views").innerText = "👁️ " + views + " views";
  });

});

</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
