<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeos - Mindset Elite</title>

<!-- PERFORMANCE -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#05070d;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* ================= NAV ================= */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 16px;
  border-radius:25px;
  transition:.3s;
  font-size:14px;
}

.navbar a:hover{
  background:#00F5FF;
  color:#000;
  box-shadow:0 0 20px #00F5FF;
}

/* ================= CONTAINER ================= */

.container{
  padding:150px 5% 120px;
  max-width:1400px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:70px;
  font-size:clamp(1.8rem,4vw,3rem);
  background:linear-gradient(90deg,#00F5FF,#fff,#00F5FF);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}

@keyframes shine{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* ================= CANAL ================= */

.channel-box{
  background:rgba(15,20,35,0.95);
  border-radius:30px;
  padding:50px;
  margin-bottom:70px;
  text-align:center;
  box-shadow:0 0 40px rgba(255,0,0,.2);
  border:1px solid rgba(255,0,0,.4);
  transition:.4s;
}

.channel-box:hover{
  transform:translateY(-6px);
  box-shadow:0 0 70px rgba(255,0,0,.6);
}

.channel-thumb{
  width:150px;
  height:150px;
  border-radius:50%;
  margin:auto;
  margin-bottom:25px;
  overflow:hidden;
  border:4px solid #ff0000;
  box-shadow:0 0 30px rgba(255,0,0,.6);
}

.channel-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BOTÃO */
.subscribe-btn{
  display:inline-block;
  margin-top:25px;
  padding:16px 40px;
  border-radius:40px;
  background:linear-gradient(90deg,#ff0000,#ff4444,#ff0000);
  background-size:200%;
  color:#fff;
  text-decoration:none;
  font-weight:700;
  transition:.4s;
  animation:btnMove 4s linear infinite;
}

.subscribe-btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 35px #ff0000;
}

@keyframes btnMove{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* ================= GRID ================= */

.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:35px;
}

/* ================= CARD ================= */

.video-card{
  background:rgba(15,20,35,0.95);
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,153,255,.25);
  transition:.4s;
  opacity:0;
  transform:translateY(30px);
}

.video-card.show{
  opacity:1;
  transform:translateY(0);
  transition:all .8s ease;
}

.video-card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 50px rgba(0,153,255,.7);
}

/* ================= IFRAME 16:9 ================= */

.video-wrapper{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  height:0;
}

.video-wrapper iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  body{padding-bottom:100px;}

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:12px 0;
    border-top:1px solid rgba(0,153,255,.4);
  }

  .container{
    padding:100px 15px 150px;
  }

  .video-grid{
    gap:25px;
  }

}
</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">

<h1>Alguns vídeos dos Estados Unidos 🇺🇸🗽</h1>

<div class="channel-box">
  <div class="channel-thumb">
    <img src="https://yt3.googleusercontent.com/mdqCINPROhI30XabGHVdb_CQxaDPf1hIkhJ7tCFmOAzuRMYXDhy7-sfoZTkAdL_UxDaRGHhf7p8=s160-c-k-c0x00ffffff-no-rj">
  </div>
  <h2>Canal Oficial</h2>
  <p>Inscreva-se para acompanhar os próximos conteúdos 🚀</p>
  <a class="subscribe-btn"
     href="https://youtube.com/@new_york2901?sub_confirmation=1"
     target="_blank">
     🔔 Inscrever-se no Canal
  </a>
</div>

<div class="video-grid">

<div class="video-card">
<div class="video-wrapper">
<iframe loading="lazy"
referrerpolicy="strict-origin-when-cross-origin"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
allowfullscreen
src="https://www.youtube.com/embed/lS8Sdam5pEA">
</iframe>
</div>
</div>

</div>

</div>

<script>
const cards=document.querySelectorAll(".video-card");
cards.forEach((card,index)=>{
  setTimeout(()=>card.classList.add("show"), index*150);
});
</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
