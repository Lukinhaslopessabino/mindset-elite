<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Vídeos - Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --accent:#00F5FF;
  --mobile-nav-height:78px;
}

body{
  font-family:'Orbitron',sans-serif;
  background:transparent;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:16px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  transition:.2s;
}

.navbar a:hover{
  background:var(--accent);
  color:#000;
}

/* PAGE */
.container{
  padding:140px 30px 140px;
  max-width:1400px;
  margin:auto;
  position:relative;
  z-index:1;
}

h1{
  font-size:26px;
  margin-bottom:30px;
  background:linear-gradient(90deg,var(--accent),#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h3{
  margin-top:30px;
  color:var(--accent);
}

/* ROW */
.row{
  display:flex;
  gap:18px;
  overflow-x:auto;
  padding:30px 0;
  position:relative;
}

.row::-webkit-scrollbar{display:none}

/* NETFLIX STYLE CARD */
.card{
  min-width:260px;
  position:relative;
  transition:transform .35s cubic-bezier(.2,.8,.2,1);
}

.card-inner{
  background:rgba(15,20,35,.85);
  border:1px solid rgba(0,153,255,.25);
  border-radius:14px;
  overflow:hidden;
  transition:all .35s cubic-bezier(.2,.8,.2,1);
  cursor:pointer;
  backdrop-filter:blur(12px);
  position:relative;
  z-index:1;
}

.card:hover{
  transform:scale(1.15);
  z-index:20;
}

.card:hover .card-inner{
  box-shadow:0 30px 80px rgba(0,0,0,.8);
  border:1px solid var(--accent);
}

/* THUMB */
.thumb{
  position:relative;
  height:150px;
  overflow:hidden;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.3s;
}

.preview{
  position:absolute;
  inset:0;
  opacity:0;
  transform:scale(1.05);
  transition:opacity .3s ease, transform .3s ease;
}

.preview iframe{
  width:100%;
  height:100%;
  border:none;
}

.card:hover .preview{
  opacity:1;
  transform:scale(1);
}

.card:hover img{
  opacity:0;
}

.strip{
  padding:10px;
  font-size:12px;
  text-align:center;
}

/* OVERLAY ESCURO */
#hoverOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:5;
}

#hoverOverlay.active{
  opacity:1;
}

/* MOBILE */
@media(max-width:768px){
  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 6px calc(10px + env(safe-area-inset-bottom));
  }

  .navbar a{
    font-size:11px;
  }

  .container{
    padding:100px 15px 100px;
  }
}
</style>
</head>

<body>

<div id="hoverOverlay"></div>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">
<h1>Streaming Mindset Elite</h1>

<h3>🔥 Catálogo</h3>
<div class="row" id="mainRow"></div>

</div>

<script>
const videos=[
"https://youtube.com/shorts/lS8Sdam5pEA",
"https://youtube.com/shorts/v_s2bz8T3a8",
"https://youtube.com/shorts/g-BJOYE_Zj8",
"https://youtube.com/shorts/OJMOJnKw77g",
"https://youtube.com/shorts/NSSgs-AH9vc",
"https://youtube.com/shorts/pX0lkVI1dkg",
"https://youtube.com/shorts/CWGaPBbQI6M",
"https://youtube.com/shorts/QTNoH8Gpho8",
"https://youtube.com/shorts/lxOMW7GOn44",
"https://youtube.com/shorts/wYi4Zvc6uuk",
"https://youtube.com/shorts/tfh5HmCJS0w",
"https://youtube.com/shorts/37D3nHE0Eac"
];

const mainRow=document.getElementById("mainRow");
const overlay=document.getElementById("hoverOverlay");

function getID(url){
 return url.split("shorts/")[1].split("?")[0];
}

function embed(id){
 return `https://www.youtube.com/embed/${id}?mute=1&controls=0&rel=0&autoplay=1`;
}

function createCard(url){

 const id=getID(url);

 const card=document.createElement("div");
 card.className="card";

 card.innerHTML=`
  <div class="card-inner">
    <div class="thumb">
      <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
      <div class="preview">
        <iframe src="${embed(id)}"></iframe>
      </div>
    </div>
    <div class="strip">${id}</div>
  </div>
 `;

 card.addEventListener("mouseenter",()=>{
   overlay.classList.add("active");
 });

 card.addEventListener("mouseleave",()=>{
   overlay.classList.remove("active");
 });

 return card;
}

videos.forEach(v=>{
 mainRow.appendChild(createCard(v));
});
</script>

<script src="layout.v3.js" defer></script>
</body>
</html>
