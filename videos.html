<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streaming • Mindset Elite</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050a15">
    <link rel="icon" type="image/png" href="logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">

    <style>
        /* CONTAINER E TÍTULO */
        .container { 
            padding-top: 140px; 
            padding-bottom: 120px; 
            overflow-x: hidden; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 5%;
        }

        .page-title {
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        .badge-live {
            font-size: 10px;
            font-weight: 800;
            color: #00ffaa;
            border: 1px solid rgba(0, 255, 170, 0.3);
            padding: 5px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 255, 170, 0.05);
        }

        .badge-live i { font-size: 8px; animation: pulse-neon 1.5s infinite; }

        @keyframes pulse-neon {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* CARROSSEL STYLE NETFLIX */
        .row-wrapper {
            position: relative;
            padding: 10px 0;
        }

        .row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 20px 5%;
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .row::-webkit-scrollbar { display: none; }

        /* CONTROLES DESKTOP */
        .scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 100px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-glass);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .row-wrapper:hover .scroll-btn { opacity: 1; }
        .scroll-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .scroll-left { left: 0; border-radius: 0 12px 12px 0; }
        .scroll-right { right: 0; border-radius: 12px 0 0 12px; }

        /* CARD DE VÍDEO */
        .card {
            min-width: 280px;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .card:hover {
            transform: scale(1.06);
            z-index: 50;
        }

        .card-inner {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .card:hover .card-inner {
            border-color: var(--primary);
            box-shadow: var(--shadow-neon);
        }

        /* THUMB E PREVIEW */
        .thumb-box {
            aspect-ratio: 16/9;
            position: relative;
            background: #000;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .video-preview {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            overflow: hidden;
        }

        .card:hover .video-preview {
            opacity: 1;
        }

        .video-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(1.4); 
        }

        /* INFOS */
        .video-info {
            padding: 15px;
            background: linear-gradient(to bottom, rgba(10, 20, 40, 0.8), rgba(5, 10, 21, 1));
        }

        .video-tag {
            font-size: 9px;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .video-title {
            font-size: 14px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        /* MOBILE OPTIMIZATION */
        @media(max-width:850px){
            .container { padding-top: 100px; }
            .scroll-btn { display: none; }
            .card { min-width: 220px; }
            .card:hover { transform: none; }
            .video-preview { display: none !important; }
            .row { gap: 12px; padding: 15px 5%; }
            .header-section { margin-bottom: 15px; }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-brand">
        <a href="index.html">
            <img src="logo.png" alt="Logo">
        </a>
    </div>
    <div class="nav-links">
        <a href="index.html">Início</a>
        <a href="membros.html">Membros</a>
        <a href="participantes.html">Participantes</a>
        <a href="videos.html" class="active">Vídeos</a>
        <a href="links.html">Links</a>
        <a href="formulario.html" class="btn">Entrar</a>
    </div>
</nav>

<div class="container">
    <header class="header-section">
        <h1 class="page-title text-gradient">Streaming Elite</h1>
        <div class="badge-live"><i class="fa-solid fa-circle"></i> ON DEMAND</div>
    </header>

    <div class="row-wrapper">
        <button class="scroll-btn scroll-left" id="btnLeft"><i class="fa-solid fa-chevron-left"></i></button>
        
        <div class="row" id="videoContainer">
            </div>

        <button class="scroll-btn scroll-right" id="btnRight"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
</div>

<div class="app-footer">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Início</span></a>
    <a href="membros.html"><i class="fa-solid fa-crown"></i><span>Membros</span></a>
    <a href="participantes.html"><i class="fa-solid fa-users"></i><span>Inscritos</span></a>
    <a href="videos.html" class="active"><i class="fa-solid fa-play"></i><span>Vídeos</span></a>
</div>

<script>
const videoLinks = [
    {id: "lS8Sdam5pEA", title: "Mentalidade Inabalável"},
    {id: "v_s2bz8T3a8", title: "Estratégia de Poder"},
    {id: "g-BJOYE_Zj8", title: "Disciplina de Elite"},
    {id: "OJMOJnKw77g", title: "Foco Total"},
    {id: "NSSgs-AH9vc", title: "Visão de Túnel"},
    {id: "pX0lkVI1dkg", title: "O Jogo Psicológico"},
    {id: "CWGaPBbQI6M", title: "Alta Performance"},
    {id: "QTNoH8Gpho8", title: "Rotina de Reis"},
    {id: "lxOMW7GOn44", title: "Networking Real"},
    {id: "wYi4Zvc6uuk", title: "Soberania Mental"},
    {id: "tfh5HmCJS0w", title: "A Arte da Guerra"},
    {id: "37D3nHE0Eac", title: "O Próximo Nível"}
];

const container = document.getElementById("videoContainer");

function createVideoCard(video) {
    const card = document.createElement("div");
    card.className = "card";
    
    card.innerHTML = `
        <div class="card-inner">
            <div class="thumb-box">
                <img src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg" 
                     onerror="this.src='https://img.youtube.com/vi/${video.id}/hqdefault.jpg'" 
                     alt="Thumbnail" loading="lazy">
                <div class="video-preview" id="preview-${video.id}"></div>
            </div>
            <div class="video-info">
                <div class="video-tag">Mindset Elite • Exclusive</div>
                <div class="video-title">${video.title}</div>
            </div>
        </div>
    `;

    // Carrega vídeo no Hover (Desktop)
    card.onmouseenter = () => {
        if(window.innerWidth > 850) {
            const preview = document.getElementById(`preview-${video.id}`);
            preview.innerHTML = `<iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${video.id}&rel=0&modestbranding=1" allow="autoplay"></iframe>`;
        }
    };

    // Limpa vídeo ao sair
    card.onmouseleave = () => {
        if(window.innerWidth > 850) {
            const preview = document.getElementById(`preview-${video.id}`);
            preview.innerHTML = "";
        }
    };

    // Abrir como Shorts ao clicar
    card.onclick = () => window.open(`https://www.youtube.com/shorts/${video.id}`, '_blank');

    return card;
}

videoLinks.forEach(video => container.appendChild(createVideoCard(video)));

// Controles de Scroll Suave
document.getElementById("btnLeft").onclick = () => container.scrollBy({left: -400, behavior: "smooth"});
document.getElementById("btnRight").onclick = () => container.scrollBy({left: 400, behavior: "smooth"});
</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
