<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeos - Mindset Elite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="global.css">

<style>

/* ESPAÇAMENTO */
.container{
  padding-top:150px;
}

/* TÍTULO */
.page-title{
  font-size:34px;
  margin-bottom:50px;
  font-weight:900;
  color:#00e0ff;
}

/* WRAPPER */
.row-wrapper{
  position:relative;
  overflow:hidden;
  border-radius:20px;
}

/* FADE LATERAL */
.row-wrapper::before,
.row-wrapper::after{
  content:"";
  position:absolute;
  top:0;
  width:100px;
  height:100%;
  z-index:5;
  pointer-events:none;
}
.row-wrapper::before{
  left:0;
  background:linear-gradient(to right,#0f172a 0%,transparent 100%);
}
.row-wrapper::after{
  right:0;
  background:linear-gradient(to left,#0f172a 0%,transparent 100%);
}

/* ROW */
.row{
  display:flex;
  gap:24px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:50px 0;
}
.row::-webkit-scrollbar{display:none}

/* BOTÕES */
.scroll-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:55px;
  height:85px;
  background:rgba(0,0,0,.7);
  border:none;
  color:#fff;
  font-size:28px;
  cursor:pointer;
  z-index:10;
  opacity:0;
  transition:.25s ease;
}
.row-wrapper:hover .scroll-btn{opacity:1}
.scroll-btn:hover{
  background:#00e0ff;
  color:#000;
}
.scroll-left{left:0;border-radius:0 12px 12px 0}
.scroll-right{right:0;border-radius:12px 0 0 12px}

/* CARD */
.card{
  min-width:300px;
  max-width:300px;
}

.card-inner{
  background:#111827;
  border-radius:18px;
  overflow:hidden;
  transition:transform .3s ease, box-shadow .3s ease;
  box-shadow:0 15px 50px rgba(0,0,0,.4);
}

.card:hover .card-inner{
  transform:scale(1.08);
  box-shadow:0 25px 80px rgba(0,0,0,.6);
}

/* THUMB */
.thumb{
  height:170px;
  position:relative;
  overflow:hidden;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.3s;
}

.preview{
  position:absolute;
  inset:0;
  opacity:0;
  transition:.3s;
}
.preview iframe{
  width:100%;
  height:100%;
  border:none;
}

.card:hover img{opacity:0}
.card:hover .preview{opacity:1}

/* STRIP */
.strip{
  padding:14px;
  text-align:center;
  font-size:13px;
  color:#cbd5e1;
  font-weight:600;
}

/* MOBILE */
@media(max-width:768px){

  .container{
    padding-top:120px;
  }

  .page-title{
    font-size:24px;
  }

  .card{
    min-width:220px;
    max-width:220px;
  }

  .thumb{
    height:140px;
  }

  .scroll-btn{
    display:none;
  }

}

</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">

  <h1 class="page-title">Streaming Mindset Elite</h1>

  <div class="row-wrapper">
    <button class="scroll-btn scroll-left" id="btnLeft">‹</button>
    <div class="row" id="mainRow"></div>
    <button class="scroll-btn scroll-right" id="btnRight">›</button>
  </div>

</div>

<div class="app-footer">
  <a href="index.html">🏠<br>Início</a>
  <a href="membros.html">👑<br>Membros</a>
  <a href="videos.html">🎬<br>Vídeos</a>
  <a href="links.html">🔗<br>Links</a>
</div>

<script>

/* LISTA */
const videos=[
  "https://youtube.com/shorts/lS8Sdam5pEA",
  "https://youtube.com/shorts/v_s2bz8T3a8",
  "https://youtube.com/shorts/g-BJOYE_Zj8",
  "https://youtube.com/shorts/OJMOJnKw77g",
  "https://youtube.com/shorts/NSSgs-AH9vc",
  "https://youtube.com/shorts/pX0lkVI1dkg",
  "https://youtube.com/shorts/CWGaPBbQI6M",
  "https://youtube.com/shorts/QTNoH8Gpho8",
  "https://youtube.com/shorts/lxOMW7GOn44",
  "https://youtube.com/shorts/wYi4Zvc6uuk",
  "https://youtube.com/shorts/tfh5HmCJS0w",
  "https://youtube.com/shorts/37D3nHE0Eac"
];

const mainRow=document.getElementById("mainRow");
const btnLeft=document.getElementById("btnLeft");
const btnRight=document.getElementById("btnRight");

function getID(url){
  return url.split("shorts/")[1].split("?")[0];
}

function embed(id){
  return `https://www.youtube.com/embed/${id}?mute=1&controls=0&rel=0&autoplay=1&playsinline=1`;
}

function createCard(url){
  const id=getID(url);
  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <div class="card-inner">
      <div class="thumb">
        <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
        <div class="preview">
          <iframe src="${embed(id)}"></iframe>
        </div>
      </div>
      <div class="strip">Mindset Elite</div>
    </div>
  `;

  return card;
}

videos.forEach(v=>mainRow.appendChild(createCard(v)));

btnLeft.onclick=()=>mainRow.scrollBy({left:-500,behavior:"smooth"});
btnRight.onclick=()=>mainRow.scrollBy({left:500,behavior:"smooth"});

</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
