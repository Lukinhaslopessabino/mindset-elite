<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --mobile-nav-height:78px;
  --cyan:#00F5FF;
}

body{
  font-family:'Orbitron',sans-serif;
  background:#05070d;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* ================= NAV ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 16px;
  border-radius:25px;
  transition:.3s;
  font-size:14px;
}

.navbar a:hover{
  background:var(--cyan);
  color:#000;
  box-shadow:0 0 20px var(--cyan);
}

/* ================= FUNDO ================= */
#particles-js{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* ================= CONTAINER ================= */
.container{
  max-width:650px;
  margin:auto;
  padding:150px 20px 120px;
}

h1{
  margin-bottom:50px;
  font-size:clamp(1.6rem,4vw,2.2rem);
  border-left:4px solid var(--cyan);
  padding-left:15px;
}

/* ================= LINK CARD ================= */
.link-card{
  display:flex;
  align-items:center;
  gap:18px;
  padding:22px;
  margin-bottom:25px;
  border-radius:22px;
  border:1px solid rgba(0,153,255,.25);
  background:rgba(15,20,35,.95);
  text-decoration:none;
  color:#fff;
  box-shadow:0 0 25px rgba(0,153,255,.15);
  transition:.25s ease;
  opacity:0;
  transform:translateY(20px);
}

.link-card.show{
  opacity:1;
  transform:translateY(0);
}

.link-card img{
  width:34px;
  height:34px;
  object-fit:contain;
}

.link-card span{
  font-weight:700;
  letter-spacing:1px;
  font-size:15px;
}

.link-card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 40px rgba(0,245,255,.5);
  background:linear-gradient(90deg,#00F5FF,#0099FF);
  color:#000;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 5px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(0,153,255,.3);
  }

  .navbar a{
    flex-direction:column;
    font-size:11px;
    padding:6px;
  }

  .container{
    padding:100px 15px 100px;
  }

  h1{
    font-size:20px;
    margin-bottom:35px;
  }

  .link-card{
    padding:18px;
    gap:12px;
  }

  .link-card img{
    width:28px;
    height:28px;
  }

  .link-card span{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div id="particles-js"></div>

<nav class="navbar">

  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>

  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
<span>Telegram do Recrutador</span>
</a>

<a href="https://chat.whatsapp.com/KcjoGvEv2gtAg6oVEB89sU" target="_blank" class="link-card">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<span>Grupo do Mindset</span>
</a>

<img src="https://cdn-icons-png.flaticon.com/512/597/597177.png">
<span>Contato Direto</span>
</a>

</div>

<script>

/* PARTÍCULAS */
if(window.innerWidth > 600 && window.particlesJS){
  particlesJS("particles-js",{
    particles:{
      number:{value:35},
      color:{value:"#00F5FF"},
      line_linked:{enable:true,color:"#00F5FF"},
      move:{speed:0.6}
    }
  });
}

/* ANIMAÇÃO ENTRADA */
const cards=document.querySelectorAll(".link-card");
cards.forEach((card,index)=>{
  setTimeout(()=>card.classList.add("show"), index*100);
});

</body>
</html>
