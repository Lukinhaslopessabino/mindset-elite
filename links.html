    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="/global.css">

    <style>
        .container {
            padding-top: 140px;
            max-width: 600px;
            margin: auto;
            padding-bottom: 120px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: clamp(24px, 6vw, 32px);
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            margin-bottom: 16px;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: var(--glass-blur);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
        }

        .link-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .link-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            font-size: 20px;
            color: var(--primary);
            transition: var(--transition);
        }

        .link-card span {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .external-icon {
            font-size: 12px;
            color: var(--text-dim);
            opacity: 0.3;
            transition: var(--transition);
        }

        .link-card:hover {
            border-color: var(--primary);
            background: rgba(0, 224, 255, 0.08);
            transform: scale(1.03);
            box-shadow: var(--shadow-neon);
        }

        .link-card:hover .link-icon {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .link-card:hover .external-icon {
            opacity: 1;
            color: var(--primary);
            transform: translateX(3px);
        }

        .link-card:active {
            transform: scale(0.98);
        }

        @media(max-width: 850px) {
            .container { padding-top: 110px; }
            .link-card { padding: 18px 20px; }
            .link-icon { width: 40px; height: 40px; font-size: 18px; }
            .link-card span { font-size: 14px; }
        }
    </style>
</head>

<body>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const cards = document.querySelectorAll(".link-card");
        
        const revealCards = () => {
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add("show");
                }, index * 120);
            });
        };

        setTimeout(revealCards, 100);
    });
</script>
