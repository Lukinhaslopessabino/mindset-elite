<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#05070d;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* ================= NAV ================= */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 16px;
  border-radius:25px;
  transition:.3s;
  font-size:14px;
}

.navbar a:hover{
  background:#00F5FF;
  color:#000;
  box-shadow:0 0 20px #00F5FF;
}

/* ================= FUNDO ================= */

#particles-js{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* ================= CONTAINER ================= */

.container{
  max-width:700px;
  margin:auto;
  padding:150px 20px 120px;
}

h1{
  margin-bottom:70px;
  font-size:clamp(1.8rem,4vw,2.5rem);
  border-left:5px solid #00F5FF;
  padding-left:15px;
  letter-spacing:1px;
}

/* ================= LINK CARD ================= */

.link-card{
  display:flex;
  align-items:center;
  gap:20px;
  padding:24px;
  margin-bottom:35px;
  border-radius:30px;
  border:1px solid rgba(0,153,255,.25);
  background:rgba(15,20,35,.95);
  text-decoration:none;
  color:#fff;
  box-shadow:0 0 35px rgba(0,153,255,.15);
  transition:.4s ease;
  opacity:0;
  transform:translateY(30px);
}

.link-card.show{
  opacity:1;
  transform:translateY(0);
  transition:all .8s ease;
}

.link-card img{
  width:38px;
  height:38px;
  object-fit:contain;
}

.link-card span{
  font-weight:700;
  letter-spacing:1px;
  font-size:16px;
}

.link-card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 60px rgba(0,245,255,.6);
  background:linear-gradient(90deg,#00F5FF,#0099FF);
  color:#000;
}

/* ================= MOBILE ================= */

@media (max-width:768px){

  body{padding-bottom:100px;}

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:12px 0;
    border-top:1px solid rgba(0,153,255,.4);
  }

  .navbar a{
    flex-direction:column;
    font-size:18px;
  }

  .container{
    padding:100px 15px 150px;
  }

}
