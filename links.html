<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Links Oficiais • Mindset Elite</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050a15">
    <link rel="icon" type="image/png" href="/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="/global.css">

    <style>
        :root {
            --primary: #00e0ff;
            --primary-glow: rgba(0, 224, 255, 0.4);
            --primary-soft: rgba(0, 224, 255, 0.08);
            --bg-card: rgba(15, 23, 42, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(16px);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-neon: 0 20px 40px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            --text-dim: #94a3b8;
            --text-main: #ffffff;
        }

        body {
            background: radial-gradient(circle at 50% 20%, #0d162a, #050914);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            padding-top: 140px;
            padding-bottom: 120px;
        }

        /* Premium Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 50px;
            background: rgba(5, 10, 21, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: var(--transition);
        }

        .nav-brand img {
            height: 35px;
            filter: drop-shadow(0 0 10px rgba(0, 224, 255, 0.4));
            transition: var(--transition);
        }

        .nav-brand img:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 16px var(--primary));
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary);
            background: var(--primary-soft);
            text-shadow: 0 0 8px rgba(0, 224, 255, 0.4);
        }

        .nav-links .btn {
            background: var(--primary);
            color: #050a15;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 4px 15px rgba(0, 224, 255, 0.2);
            text-shadow: none;
            text-decoration: none;
            transition: var(--transition);
        }

        .nav-links .btn:hover {
            filter: brightness(1.15);
            box-shadow: 0 8px 20px var(--primary-glow);
            transform: translateY(-1px);
        }

        .container {
            padding-top: 20px;
            max-width: 600px;
            margin: auto;
            padding-bottom: 120px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: clamp(24px, 6vw, 32px);
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            margin-bottom: 16px;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: var(--glass-blur);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
        }

        .link-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .link-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            font-size: 20px;
            color: var(--primary);
            transition: var(--transition);
        }

        .link-card span {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .external-icon {
            font-size: 12px;
            color: var(--text-dim);
            opacity: 0.3;
            transition: var(--transition);
        }

        .link-card:hover {
            border-color: var(--primary);
            background: rgba(0, 224, 255, 0.08);
            transform: scale(1.03);
            box-shadow: var(--shadow-neon);
        }

        .link-card:hover .link-icon {
            background: var(--primary);
            color: #050a15;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .link-card:hover .external-icon {
            opacity: 1;
            color: var(--primary);
            transform: translateX(3px);
        }

        .link-card:active {
            transform: scale(0.98);
        }

        /* Premium Footer */
        .app-footer {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(5, 10, 21, 0.98);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            justify-content: space-around;
            z-index: 1000;
        }

        .app-footer a {
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            gap: 6px;
            transition: var(--transition);
        }

        .app-footer a.active, .app-footer a:hover {
            color: var(--primary);
        }

        .app-footer a i {
            font-size: 18px;
            color: var(--primary);
            transition: var(--transition);
        }

        .app-footer a.active i {
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        @media(max-width: 850px) {
            body { padding-top: 70px; }
            .navbar { padding: 20px 30px; height: 70px; }
            .nav-links { display: none; }
            .app-footer { display: flex; }
            .container { padding-top: 30px; }
            .link-card { padding: 18px 20px; }
            .link-icon { width: 40px; height: 40px; font-size: 18px; }
            .link-card span { font-size: 14px; }
        }

        @media (max-width: 480px) {
            .navbar { height: 65px; padding: 0 15px; }
            .container { padding-left: 15px; padding-right: 15px; }
        }

        /* ============================================================
           BOTÃO FLUTUANTE "BAIXAR APK"
        ============================================================ */
        .apk-float {
            position: fixed;
            right: 22px;
            bottom: 30px;
            z-index: 2500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary);
            color: #050a15 !important;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 999px;
            box-shadow: 0 0 20px var(--primary-glow), 0 4px 14px rgba(0,0,0,0.4);
            transition: var(--transition);
            animation: apk-pulse 2.4s ease-in-out infinite;
        }

        .apk-float i { font-size: 16px; }

        .apk-float:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 28px var(--primary), 0 6px 16px rgba(0,0,0,0.45);
            filter: brightness(1.08);
        }

        @keyframes apk-pulse {
            0%, 100% { box-shadow: 0 0 20px var(--primary-glow), 0 4px 14px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 0 32px var(--primary-glow), 0 4px 14px rgba(0,0,0,0.4); }
        }

        @media (max-width: 850px) {
            .apk-float {
                right: 16px;
                bottom: 82px;
                padding: 12px 16px;
            }
            .apk-float span { display: none; }
        }
    </style>
</head>
