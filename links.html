<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --mobile-nav-height:78px;
  --bg-primary:#05070d;
  --text-primary:#ffffff;
  --accent:#00F5FF;
}

body{
  font-family:'Orbitron',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .4s ease,color .4s ease;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:16px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:var(--text-primary);
  text-decoration:none;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  transition:.2s;
}

.navbar a:hover{
  background:var(--accent);
  color:#000;
  box-shadow:0 0 20px var(--accent);
}

/* CONTAINER */
.container{
  max-width:600px;
  margin:auto;
  padding:150px 20px 140px;
  position:relative;
  z-index:1;
}

h1{
  font-size:26px;
  margin-bottom:40px;
  background:linear-gradient(90deg,var(--accent),#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* LINK CARD */
.link-card{
  display:flex;
  align-items:center;
  gap:18px;
  padding:20px 22px;
  margin-bottom:22px;
  border-radius:18px;
  border:1px solid var(--accent);
  background:rgba(15,20,35,.75);
  backdrop-filter:blur(16px);
  text-decoration:none;
  color:var(--text-primary);
  transition:.3s;
  opacity:0;
  transform:translateY(15px);
}

.link-card.show{
  opacity:1;
  transform:translateY(0);
}

.link-card img{
  width:34px;
  height:34px;
  object-fit:contain;
  transition:.3s;
}

.link-card span{
  font-weight:700;
  font-size:15px;
  letter-spacing:1px;
}

.link-card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 40px var(--accent);
  background:linear-gradient(90deg,var(--accent),#00aaff);
  color:#000;
}

.link-card:hover img{
  transform:scale(1.1);
  filter:brightness(0);
}

/* MOBILE */
@media(max-width:768px){

  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 5px calc(10px + env(safe-area-inset-bottom));
  }

  .navbar a{
    font-size:11px;
    padding:6px;
  }

  .container{
    padding:100px 15px 120px;
  }

  h1{
    font-size:20px;
  }

  .link-card{
    padding:18px;
    gap:14px;
  }

  .link-card span{
    font-size:13px;
  }
}
</style>
</head>
