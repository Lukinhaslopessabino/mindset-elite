<style>

/* ESPAÇAMENTO */
.container{
  padding-top:150px;
  max-width:700px;
}

/* TÍTULO */
.page-title{
  text-align:center;
  font-size:32px;
  margin-bottom:60px;
  font-weight:900;
  color:#00e0ff;
}

/* LINK CARD */
.link-card{
  display:flex;
  align-items:center;
  gap:22px;
  padding:26px;
  margin-bottom:28px;
  border-radius:20px;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  text-decoration:none;
  color:#ffffff;
  transition:.3s ease;
  box-shadow:0 15px 50px rgba(0,0,0,.4);
  transform:translateY(15px);
  opacity:0;
}

.link-card.show{
  transform:translateY(0);
  opacity:1;
}

.link-card img{
  width:38px;
  height:38px;
  object-fit:contain;
  transition:.3s ease;
}

.link-card span{
  font-weight:700;
  font-size:16px;
  letter-spacing:.5px;
}

/* HOVER */
.link-card:hover{
  transform:translateY(-6px);
  box-shadow:0 25px 80px rgba(0,0,0,.6);
  border-color:#00e0ff;
}

.link-card:hover img{
  transform:scale(1.1);
}

/* MOBILE */
@media(max-width:768px){

  .container{
    padding-top:120px;
  }

  .page-title{
    font-size:24px;
    margin-bottom:40px;
  }

  .link-card{
    padding:18px;
    gap:16px;
  }

  .link-card span{
    font-size:14px;
  }

}

</style>
