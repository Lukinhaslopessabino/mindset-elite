<style>

.page-title{

/* LINK CARD */
.link-card{
  display:flex;
  align-items:center;
  gap:20px;
  padding:24px;
  margin-bottom:24px;
  border-radius:var(--radius-lg);
  border:1px solid var(--stroke);
  background:var(--panel);
  backdrop-filter:blur(14px);
  text-decoration:none;
  color:var(--text);
  transition:.3s ease;
  opacity:0;
  transform:translateY(15px);
  box-shadow:var(--shadow-1);
}

.link-card.show{
  opacity:1;
  transform:translateY(0);
}

.link-card img{
  width:36px;
  height:36px;
  object-fit:contain;
  transition:.3s;
}

.link-card span{
  font-weight:700;
  font-size:15px;
  letter-spacing:1px;
}

.link-card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-2);
  border-color:var(--cyan);
}

.link-card:hover img{
  transform:scale(1.1);
}

</style>
