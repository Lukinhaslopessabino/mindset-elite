    <style>
        /* Ajuste do Container para Linktree Style */
        .container {
            padding-top: 130px;
            max-width: 600px;
            margin: auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* LINK CARD EVOLUTION */
        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 28px;
            margin-bottom: 20px;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            text-decoration: none;
            color: var(--text-main);
            backdrop-filter: var(--glass-blur);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }

        .link-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .link-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            font-size: 20px;
            color: var(--primary);
            transition: var(--transition);
        }

        .link-card span {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .external-icon {
            font-size: 12px;
            color: var(--text-dim);
            opacity: 0.5;
            transition: var(--transition);
        }

        /* HOVER STATES */
        .link-card:hover {
            border-color: var(--primary);
            background: rgba(0, 224, 255, 0.05);
            transform: scale(1.02);
            box-shadow: var(--shadow-neon);
        }

        .link-card:hover .link-icon {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .link-card:hover .external-icon {
            opacity: 1;
            color: var(--primary);
            transform: translateX(5px);
        }

        @media(max-width: 768px) {
            .container { padding-top: 100px; padding-bottom: 120px; }
            .page-header h1 { font-size: 24px; }
            .link-card { padding: 18px 22px; }
        }
    </style>
</head>

<script>
