<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mindset Elite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* Variáveis obrigatórias para tema dinâmico */
:root{
  --mobile-nav-height:78px;
  --bg-primary:#05070d;
  --text-primary:#ffffff;
  --accent:#00F5FF;
}

body{
  font-family:'Orbitron',sans-serif;
  color:var(--text-primary);
  overflow-x:hidden;
  background:var(--bg-primary);
  transition:background .4s ease,color .4s ease;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity .6s ease;
}

#loader h1{
  letter-spacing:3px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:.4}
  50%{opacity:1}
  100%{opacity:.4}
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:var(--text-primary);
  text-decoration:none;
  padding:8px 16px;
  border-radius:25px;
  transition:.3s;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:14px;
}

.navbar a:hover{
  background:var(--accent);
  color:#000;
  box-shadow:0 0 20px var(--accent);
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:120px 20px 60px;
  position:relative;
  z-index:1;
}

.hero h1{
  font-size:clamp(2.5rem,6vw,4.5rem);
  background:linear-gradient(90deg,var(--accent),#fff,var(--accent));
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glowMove 6s linear infinite;
}

@keyframes glowMove{
  0%{background-position:0%}
  100%{background-position:200%}
}

.hero p{
  margin-top:20px;
  font-size:1.1rem;
  opacity:.9;
  max-width:600px;
}

.cta-btn{
  margin-top:35px;
  padding:14px 35px;
  border-radius:40px;
  text-decoration:none;
  font-weight:700;
  background:linear-gradient(90deg,var(--accent),#0099FF);
  color:#000;
  transition:.4s;
  box-shadow:0 0 25px var(--accent);
}

.cta-btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 40px var(--accent);
}

/* SECTION */
section{
  padding:120px 10%;
  text-align:center;
  position:relative;
  z-index:1;
}

section h2{
  font-size:2rem;
  margin-bottom:25px;
  color:var(--accent);
}

section p{
  max-width:700px;
  margin:auto;
  opacity:.85;
}

/* MOBILE */
@media (max-width:768px){

  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 5px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(255,255,255,.1);
  }

  .navbar a{
    flex-direction:column;
    font-size:11px;
    padding:6px;
  }

  .hero{
    padding:90px 15px 60px;
  }

  .hero h1{
    font-size:26px;
  }

  .hero p{
    font-size:14px;
  }

  section{
    padding:80px 20px;
  }
}
</style>
</head>

<body>

<div id="loader">
<h1>LOADING MINDSET...</h1>
</div>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="hero">
  <h1>Mindset Elite</h1>
  <p>Elite não nasce. Elite se constrói.</p>
  <a href="formulario.html" class="cta-btn">Entrar para a Elite</a>
</div>

<section>
  <h2>Mentalidade Global</h2>
  <p>
  Construindo uma elite com visão internacional.
  Networking forte, crescimento real e mentalidade de alto nível.
  </p>
</section>

<script>
window.addEventListener("load", function(){
  const loader = document.getElementById("loader");
  if(!loader) return;
  loader.style.opacity="0";
  setTimeout(()=>loader.style.display="none",500);
});
</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
