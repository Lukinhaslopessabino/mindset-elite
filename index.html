<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ================= LOADER ================= */

#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity .6s ease;
}

#loader h1{
  letter-spacing:3px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:.4}
  50%{opacity:1}
  100%{opacity:.4}
}

/* ================= NAV ================= */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 16px;
  border-radius:25px;
  transition:.3s;
  display:flex;
  align-items:center;
  gap:6px;
}

.navbar a:hover{
  background:#00F5FF;
  color:#000;
  box-shadow:0 0 20px #00F5FF;
}

/* ================= HERO ================= */

.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:120px 20px 60px;
}

.hero h1{
  font-size:clamp(2.8rem,6vw,4.5rem);
  background:linear-gradient(90deg,#00F5FF,#fff,#00F5FF);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glowMove 6s linear infinite;
}

@keyframes glowMove{
  0%{background-position:0%}
  100%{background-position:200%}
}

.hero p{
  margin-top:20px;
  font-size:1.2rem;
  opacity:.9;
  max-width:600px;
}

/* CTA */

.cta-btn{
  margin-top:35px;
  padding:14px 35px;
  border-radius:40px;
  text-decoration:none;
  font-weight:700;
  background:linear-gradient(90deg,#00F5FF,#0099FF);
  color:#000;
  transition:.4s;
  box-shadow:0 0 25px rgba(0,245,255,.5);
}

.cta-btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 40px rgba(0,245,255,.9);
}

/* ================= SECTION ================= */

section{
  padding:120px 10%;
  text-align:center;
}

section h2{
  font-size:2rem;
  margin-bottom:25px;
  color:#00F5FF;
}

section p{
  max-width:700px;
  margin:auto;
  opacity:.85;
}

/* ================= REVEAL ================= */

.reveal{
  opacity:0;
  transform:translateY(40px);
}

.active{
  opacity:1;
  transform:translateY(0);
  transition:all 1s ease;
}

/* ================= CANVAS ================= */

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ================= MOBILE ================= */

@media (max-width:768px){

  body{padding-bottom:90px;}

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid rgba(0,153,255,.4);
  }

  .navbar a{
    flex-direction:column;
    font-size:18px;
  }

  .navbar a span{
    font-size:11px;
  }

  .hero h1{font-size:30px;}
  .hero p{font-size:15px;}
  section{padding:80px 20px;}

}
</style>
</head>

<body>

<div id="loader">
<h1>LOADING MINDSET...</h1>
</div>

<canvas id="bg3d"></canvas>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="hero">
<h1 class="reveal">Mindset Elite</h1>
<p class="reveal">Elite não nasce. Elite se constrói.</p>
<a href="formulario.html" class="cta-btn reveal">Entrar para a Elite</a>
</div>

<section>
<h2 class="reveal">Mentalidade Global</h2>
<p class="reveal">
Construindo uma elite com visão internacional.
Networking forte, crescimento real e mentalidade de alto nível.
</p>
</section>

<script>

/* LOADER */
window.addEventListener("load",()=>{
  gsap.to("#loader",{opacity:0,duration:.8,onComplete:()=>{
    document.getElementById("loader").style.display="none";
  }});
});

/* FUNDO 3D */
if(window.innerWidth > 768){

const canvas=document.getElementById("bg3d");
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

const geometry=new THREE.BufferGeometry();
const vertices=[];

for(let i=0;i<1200;i++){
vertices.push(
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000)
);
}

geometry.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3));

const material=new THREE.PointsMaterial({color:0x00f5ff,size:2});
const particles=new THREE.Points(geometry,material);
scene.add(particles);

camera.position.z=700;

function animate(){
requestAnimationFrame(animate);
particles.rotation.x+=0.0003;
particles.rotation.y+=0.0003;
renderer.render(scene,camera);
}
animate();

}

/* SCROLL REVEAL */
const reveals=document.querySelectorAll(".reveal");

window.addEventListener("scroll",()=>{
reveals.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add("active");
}
});
});

</script>

<script src="layout.js?v=2"></script>

</body>
</html>
