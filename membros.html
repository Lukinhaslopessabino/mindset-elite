<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Membros - Mindset Elite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="global.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>

<style>

/* STATUS BAR */
.statusbar{
  position:fixed;
  top:90px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  align-items:center;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(0,0,0,.6);
  border:1px solid var(--cyan);
  font-size:12px;
  z-index:999;
}

.dot{
  width:8px;height:8px;border-radius:50%;
  background:#FF4D4D;
}
.dot.ok{ background:#00FFAA; }

.badge{
  padding:4px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  font-size:10px;
  font-weight:900;
}

.btn-mini{
  border:none;
  cursor:pointer;
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
  background:linear-gradient(90deg,var(--cyan),#0099FF);
  color:#000;
  font-size:11px;
}

/* TÍTULO */
.page-title{
  text-align:center;
  font-size:28px;
  margin-bottom:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:30px;
}

/* CARD */
.member-card{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:var(--radius-lg);
  padding:25px;
  text-align:center;
  position:relative;
  transition:.3s;
  box-shadow:var(--shadow-1);
}

.member-card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-2);
}

.rank{
  position:absolute;
  top:14px;
  right:16px;
  font-size:13px;
  font-weight:900;
  color:var(--cyan);
}

.xp{
  position:absolute;
  top:14px;
  left:16px;
  font-size:11px;
  padding:5px 8px;
  border-radius:999px;
  background:rgba(0,0,0,.6);
}

.avatar-wrapper{
  width:90px;
  height:90px;
  margin:20px auto 14px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid var(--cyan);
}

.avatar-wrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.member-card h3{
  font-size:15px;
  margin-bottom:4px;
}

.member-card p{
  font-size:12px;
  opacity:.8;
}

@media(max-width:768px){
  .statusbar{
    top:15px;
  }
}

</style>
</head>

<body>

<!-- NAV DESKTOP -->
<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="statusbar">
  <span class="dot" id="liveDot"></span>
  <span id="liveText">Live: offline</span>
  <span class="badge" id="liveBadge">0</span>
  <button class="btn-mini" onclick="carregarRanking()">↻</button>
</div>

<div class="container">

  <h2 class="holo-title page-title">🏆 Ranking Mindset Elite</h2>

  <div class="grid" id="membersGrid">
    Carregando ranking…
  </div>

</div>

<!-- FOOTER MOBILE -->
<div class="app-footer">
  <a href="index.html">🏠<br>Início</a>
  <a href="membros.html">👑<br>Membros</a>
  <a href="videos.html">🎬<br>Vídeos</a>
  <a href="links.html">🔗<br>Links</a>
</div>

<script>
const BACKEND_BASE = "https://mindset-elite.onrender.com";
const RANKING_URL = BACKEND_BASE + "/ranking";
const DEFAULT_AVATAR = BACKEND_BASE + "/images/default.jpg";

function setLive(ok){
  document.getElementById("liveDot").className = ok ? "dot ok" : "dot";
  document.getElementById("liveText").textContent = ok ? "Live: online" : "Live: offline";
}

function calcXP(user){
  const idade = Number(user?.idade ?? 0);
  return 500 + (idade * 3);
}

async function carregarRanking(){
  const grid = document.getElementById("membersGrid");
  grid.innerHTML = "Carregando ranking…";

  try{
    const res = await fetch(RANKING_URL,{cache:"no-store"});
    if(!res.ok) throw new Error();

    const data = await res.json();
    const list = Array.isArray(data?.ranking)?data.ranking:[];

    if(list.length===0){
      grid.innerHTML="Nenhum membro ainda.";
      setLive(true);
      return;
    }

    const sorted=list.map(u=>({...u,xp:calcXP(u)}))
                     .sort((a,b)=>b.xp-a.xp);

    grid.innerHTML="";

    sorted.forEach((u,i)=>{
      const card=document.createElement("div");
      card.className="member-card";
      card.innerHTML=`
        <div class="xp">⚡ XP ${u.xp}</div>
        <div class="rank">#${i+1}</div>
        <div class="avatar-wrapper">
          <img src="${u.foto?BACKEND_BASE+"/images/"+u.foto:DEFAULT_AVATAR}">
        </div>
        <h3>${u.nome||"Sem nome"}</h3>
        <p>${u.idade||""} anos</p>
      `;
      grid.appendChild(card);
    });

    setLive(true);

  }catch{
    grid.innerHTML="Erro ao carregar ranking.";
    setLive(false);
  }
}

carregarRanking();
</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
