<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participantes • Mindset Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <style>
        .container { padding-top: 140px; max-width: 900px; }
        .user-list { background: var(--bg-card); border-radius: 15px; border: 1px solid var(--border-glass); }
        .user-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">ME</div>
        <div class="nav-links">
            <a href="index.html">Início</a>
            <a href="membros.html">Membros</a>
            <a href="participantes.html" class="active">Participantes</a>
            <a href="videos.html">Vídeos</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-gradient" style="margin-bottom:30px;">Base de Participantes</h1>
        <div class="user-list" id="userList">
            <p style="padding:20px; text-align:center;">Buscando registros...</p>
        </div>
    </div>

    <script>
        async function carregarLista() {
            const listEl = document.getElementById("userList");
            try {
                const res = await fetch("https://mindset-elite.onrender.com/ranking");
                const data = await res.json();
                const users = data.ranking || [];
                
                listEl.innerHTML = users.map(u => `
                    <div class="user-item">
                        <div class="user-info">
                            <img class="user-img" src="${u.foto || 'https://ui-avatars.com/api/?name='+u.nome}">
                            <div>
                                <div style="font-weight:700; color:#fff;">${u.nome}</div>
                                <div style="font-size:12px; opacity:0.6; color:var(--primary);">${u.telegram}</div>
                            </div>
                        </div>
                        <div style="font-family:'Orbitron'; font-size:12px; color:#fff;">${u.idade} ANOS</div>
                    </div>
                `).join('');
            } catch (e) { listEl.innerHTML = "<p>Erro de conexão.</p>"; }
        }
        carregarLista();
    </script>
</body>
</html>
