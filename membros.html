<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Elite • Mindset Elite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">

    <style>
        .container { padding-top: 160px; }

        /* STATUS BAR - HUD STYLE */
        .statusbar {
            position: fixed;
            top: 95px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 10px 20px;
            border-radius: 100px;
            background: rgba(10, 15, 28, 0.8);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-glass);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .status-item { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }
        .dot.online { background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        .btn-refresh {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        .btn-refresh:hover { transform: rotate(180deg); color: #fff; }

        /* TITULO */
        .page-header { text-align: center; margin-bottom: 60px; }

        /* GRID RANKING */
        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* CARD DE MEMBRO */
        .member-card {
            position: relative;
            text-align: center;
            padding-top: 50px;
            overflow: hidden;
        }

        .rank-position {
            position: absolute;
            top: 20px;
            right: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 800;
            opacity: 0.3;
            color: var(--text-muted);
        }

        .xp-tag {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 224, 255, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid var(--primary-soft);
        }

        .avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, var(--border-glass), transparent);
            border: 1px solid var(--border-glass);
            position: relative;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        /* DESTAQUES TOP 3 */
        .rank-1 { border-color: #ffd700 !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .rank-1 .rank-position { color: #ffd700; opacity: 1; }
        .rank-1 .avatar-container img { border-color: #ffd700; }

        .rank-2 .rank-position { color: #c0c0c0; opacity: 0.8; }
        .rank-3 .rank-position { color: #cd7f32; opacity: 0.8; }

        .member-info h3 { font-size: 18px; color: #fff; margin-bottom: 5px; }
        .member-info p { font-size: 13px; color: var(--text-dim); }

        @media(max-width: 768px) {
            .container { padding-top: 130px; }
            .statusbar { top: 85px; width: 90%; justify-content: space-between; }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-brand" style="font-family: 'Orbitron'; font-weight: 800; color: var(--primary);">ME</div>
    <div class="nav-links">
        <a href="index.html"><i class="fa-solid fa-house"></i> Início</a>
        <a href="membros.html" class="active"><i class="fa-solid fa-crown"></i> Membros</a>
        <a href="videos.html"><i class="fa-solid fa-play"></i> Vídeos</a>
        <a href="links.html"><i class="fa-solid fa-link"></i> Links</a>
    </div>
</nav>

<div class="statusbar">
    <div class="status-item">
        <span class="dot" id="liveDot"></span>
        <span id="liveText">Sistema: Offline</span>
    </div>
    <div class="status-item">
        <i class="fa-solid fa-users"></i>
        <span id="memberCount">0</span> ELITES
    </div>
    <button class="btn-refresh" onclick="carregarRanking()" title="Atualizar">
        <i class="fa-solid fa-rotate"></i>
    </button>
</div>

<div class="container">
    <header class="page-header">
        <h1 class="text-gradient">Ranking Mindset Elite</h1>
        <p>A HIERARQUIA DOS QUE CONSTRUEM O FUTURO</p>
    </header>

    <div class="ranking-grid" id="membersGrid">
        </div>
</div>

<div class="app-footer">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Início</span></a>
    <a href="membros.html" class="active"><i class="fa-solid fa-crown"></i><span>Membros</span></a>
    <a href="videos.html"><i class="fa-solid fa-play"></i><span>Vídeos</span></a>
    <a href="links.html"><i class="fa-solid fa-link"></i><span>Links</span></a>
</div>

<script>
    const BACKEND_BASE = "https://mindset-elite.onrender.com";
    const RANKING_URL = `${BACKEND_BASE}/ranking`;
    const DEFAULT_AVATAR = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"; // Ícone neutro mais moderno

    function setSystemStatus(isOnline) {
        const dot = document.getElementById("liveDot");
        const text = document.getElementById("liveText");
        dot.className = isOnline ? "dot online" : "dot";
        text.textContent = isOnline ? "Sistema: Online" : "Sistema: Offline";
    }

    function calcXP(user) {
        const idade = Number(user?.idade ?? 0);
        return 500 + (idade * 3);
    }

    async function carregarRanking() {
        const grid = document.getElementById("membersGrid");
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim);">
                            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; color: var(--primary);"></i>
                            <p style="margin-top: 15px;">Sincronizando base de dados...</p>
                         </div>`;

        try {
            const res = await fetch(RANKING_URL, { cache: "no-store" });
            if (!res.ok) throw new Error();

            const data = await res.json();
            const list = Array.isArray(data?.ranking) ? data.ranking : [];
            
            document.getElementById("memberCount").textContent = list.length;

            if (list.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Nenhum membro recrut
