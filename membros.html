<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membros - Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#000,#0a0f1c);
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

/* ================= NAV PADRÃO APP ================= */

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:25px;
padding:18px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(15px);
z-index:1000;
}

.navbar a{
color:#fff;
text-decoration:none;
padding:8px 16px;
border-radius:25px;
transition:.3s;
display:flex;
align-items:center;
gap:6px;
font-size:14px;
}

.navbar a:hover{
background:#00F5FF;
color:#000;
box-shadow:0 0 20px #00F5FF;
}

/* ================= CONTAINER ================= */

.container{
max-width:1200px;
margin:auto;
padding:150px 20px 120px;
}

h2{
font-size:28px;
margin-bottom:50px;
text-align:center;
background:linear-gradient(90deg,#00F5FF,#fff,#00F5FF);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ================= GRID ================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:35px;
}

/* ================= CARD ================= */

.member-card{
background:rgba(15,20,35,0.95);
padding:30px;
border-radius:25px;
text-align:center;
border:1px solid rgba(0,153,255,0.3);
box-shadow:0 0 25px rgba(0,153,255,0.25);
transition:.4s;
position:relative;
opacity:0;
transform:translateY(30px);
}

.member-card.show{
opacity:1;
transform:translateY(0);
transition:all .8s ease;
}

.member-card:hover{
transform:translateY(-8px);
box-shadow:0 0 45px rgba(0,153,255,0.8);
}

/* RANK BADGE */

.rank{
position:absolute;
top:15px;
right:18px;
font-size:15px;
font-weight:700;
color:#00F5FF;
}

/* AVATAR */

.avatar-wrapper{
width:120px;
height:120px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:3px solid #00F5FF;
margin-bottom:20px;
box-shadow:0 0 25px rgba(0,245,255,.6);
}

.avatar-wrapper img{
width:100%;
height:100%;
object-fit:cover;
}

.member-card h3{
margin-bottom:5px;
font-size:18px;
}

.member-card p{
opacity:.8;
font-size:14px;
}

/* ================= MOBILE APP STYLE ================= */

@media (max-width:768px){

body{padding-bottom:100px;}

.navbar{
top:auto;
bottom:0;
justify-content:space-around;
padding:12px 0;
border-top:1px solid rgba(0,153,255,.4);
}

.navbar a{
flex-direction:column;
font-size:18px;
}

.container{
padding:100px 15px 150px;
}

.grid{
gap:25px;
}

}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>
</head>

<body>

<canvas id="bg3d"></canvas>

<nav class="navbar">
<a href="index.html">🏠 Início</a>
<a href="membros.html">👑 Membros</a>
<a href="participantes.html">🎯 Participantes</a>
<a href="videos.html">🎬 Vídeos</a>
<a href="links.html">🔗 Links</a>
<a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">
<h2>🏆 Ranking Mindset Elite</h2>
<div class="grid" id="membersGrid">
Carregando ranking...
</div>
</div>

<script>

/* ================= FUNDO 3D ================= */

if(window.innerWidth > 768){

const canvas=document.getElementById("bg3d");
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({canvas:canvas,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

const geometry=new THREE.BufferGeometry();
const vertices=[];

for(let i=0;i<1200;i++){
vertices.push(
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000)
);
}

geometry.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3));
const material=new THREE.PointsMaterial({color:0x00f5ff,size:2});
const particles=new THREE.Points(geometry,material);
scene.add(particles);

camera.position.z=700;

function animate(){
requestAnimationFrame(animate);
particles.rotation.x+=0.0003;
particles.rotation.y+=0.0003;
renderer.render(scene,camera);
}
animate();

}

/* ================= RANKING ================= */

async function carregarRanking(){

const grid=document.getElementById("membersGrid");

try{

const res=await fetch("https://mindset-elite.onrender.com/ranking");

if(!res.ok){
grid.innerHTML="⚠ Ranking indisponível.";
return;
}

const data=await res.json();
grid.innerHTML="";

if(!data.ranking || data.ranking.length===0){
grid.innerHTML="Nenhum membro ainda.";
return;
}

data.ranking.forEach((user,index)=>{

let medal="";
if(user.rank===1) medal="🥇";
else if(user.rank===2) medal="🥈";
else if(user.rank===3) medal="🥉";

const fotoPath=user.foto?`/images/${user.foto}`:"/images/default.jpg";

const card=document.createElement("div");
card.className="member-card";

card.innerHTML=`
<div class="rank">#${user.rank} ${medal}</div>
<div class="avatar-wrapper">
<img src="${fotoPath}" alt="${user.nome}">
</div>
<h3>${user.nome}</h3>
<p>${user.idade || 0} anos</p>
`;

grid.appendChild(card);

setTimeout(()=>{
card.classList.add("show");
}, index*120);

});

}catch(err){
grid.innerHTML="⚠ Erro ao carregar ranking.";
console.error(err);
}

}

carregarRanking();

</script>

</body>
</html>
