<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Membros - Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --mobile-nav-height:78px;
  --cyan:#00F5FF;
  --bg1:#000;
  --bg2:#0a0f1c;
}

body{
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:#fff;
  min-height:100vh;
}

/* ================= NAV ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:22px;
  padding:16px;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 14px;
  border-radius:22px;
  transition:.25s;
  font-size:14px;
}

.navbar a:hover{
  background:var(--cyan);
  color:#000;
}

/* ================= STATUS ================= */
.statusbar{
  position:fixed;
  top:75px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(0,153,255,.2);
  font-size:11px;
  z-index:999;
}

.dot{
  width:6px;height:6px;border-radius:50%;
  background:#FF4D4D;
}

.badge{
  padding:4px 8px;
  border-radius:999px;
  background:rgba(0,245,255,.2);
  font-size:10px;
}

/* ================= CONTAINER ================= */
.container{
  max-width:1100px;
  margin:auto;
  padding:150px 20px 120px;
}

h2{
  text-align:center;
  font-size:26px;
  margin-bottom:25px;
  background:linear-gradient(90deg,var(--cyan),#fff,var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:25px;
}

/* ================= CARD ================= */
.member-card{
  background:rgba(15,20,35,.95);
  padding:22px;
  border-radius:22px;
  text-align:center;
  border:1px solid rgba(0,153,255,.25);
  transition:.25s;
  position:relative;
}

.member-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 35px rgba(0,153,255,.35);
}

.rank{
  position:absolute;
  top:12px;
  right:14px;
  font-size:12px;
  font-weight:900;
  color:var(--cyan);
}

.xp{
  position:absolute;
  top:12px;
  left:14px;
  font-size:11px;
  padding:5px 8px;
  border-radius:999px;
  background:rgba(0,0,0,.4);
}

.avatar-wrapper{
  width:90px;
  height:90px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:2px solid var(--cyan);
  margin-bottom:14px;
}

.avatar-wrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.member-card h3{
  font-size:15px;
  margin-bottom:4px;
}

.member-card p{
  font-size:12px;
  opacity:.8;
}

/* ================= MOBILE ================= */
@media(max-width:768px){

  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 5px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(0,153,255,.3);
  }

  .navbar a{
    flex-direction:column;
    font-size:11px;
    padding:6px;
  }

  .statusbar{
    top:12px;
    font-size:10px;
    padding:6px 10px;
  }

  .container{
    padding:100px 15px 100px;
  }

  h2{
    font-size:20px;
  }

  .grid{
    gap:18px;
  }

  .member-card{
    padding:18px;
  }

  .avatar-wrapper{
    width:75px;
    height:75px;
  }

  .member-card h3{
    font-size:14px;
  }

  .member-card p{
    font-size:11px;
  }
}

</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="statusbar">
  <span class="dot"></span>
  Live
  <span class="badge">0</span>
</div>

<div class="container">
  <h2>🏆 Ranking Mindset Elite</h2>
  <div class="grid" id="membersGrid">
    Carregando...
  </div>
</div>

<script src="layout.v3.js" defer></script>

</body>
</html>
