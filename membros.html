<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking de Elite • Mindset Elite</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050a15">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">

    <style>
        .container { padding-top: 160px; padding-bottom: 100px; }

        /* STATUS BAR - HUD STYLE */
        .statusbar {
            position: fixed;
            top: 95px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 12px 25px;
            border-radius: 100px;
            background: rgba(10, 15, 28, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .status-item { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4d4d; transition: 0.3s; }
        .dot.online { background: #00ffaa; box-shadow: 0 0 12px #00ffaa; }

        .btn-refresh {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }
        .btn-refresh:hover { transform: rotate(180deg); filter: brightness(1.3); }

        /* TITULO */
        .page-header { text-align: center; margin-bottom: 50px; }
        .page-header p { letter-spacing: 4px; font-weight: 700; opacity: 0.7; font-size: 12px; }

        /* GRID RANKING */
        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* CARD DE MEMBRO */
        .member-card {
            position: relative;
            text-align: center;
            padding: 50px 20px 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            transition: var(--transition);
        }

        .member-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: var(--shadow-neon);
        }

        .rank-position {
            position: absolute;
            top: 15px;
            right: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            opacity: 0.2;
            color: #fff;
        }

        .xp-tag {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 224, 255, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            border: 1px solid var(--primary-soft);
        }

        .avatar-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--primary), transparent);
            position: relative;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #050a15;
            background: #111;
        }

        /* DESTAQUES TOP 3 */
        .rank-1 { border-color: #ffd700 !important; background: rgba(255, 215, 0, 0.05); }
        .rank-1 .rank-position { color: #ffd700; opacity: 0.8; }
        .rank-1 .avatar-container { background: #ffd700; }

        .rank-2 { border-color: #c0c0c0 !important; }
        .rank-2 .rank-position { color: #c0c0c0; opacity: 0.8; }
        
        .rank-3 { border-color: #cd7f32 !important; }
        .rank-3 .rank-position { color: #cd7f32; opacity: 0.8; }

        .member-info h3 { font-size: 18px; color: #fff; margin-bottom: 5px; font-family: 'Orbitron'; }
        .member-info p { font-size: 13px; color: var(--text-dim); text-transform: lowercase; }

        @media(max-width: 768px) {
            .container { padding-top: 140px; }
            .statusbar { top: 85px; width: 92%; padding: 10px 15px; }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-brand">ME</div>
    <div class="nav-links">
        <a href="index.html"><i class="fa-solid fa-house"></i> Início</a>
        <a href="membros.html" class="active"><i class="fa-solid fa-crown"></i> Membros</a>
        <a href="videos.html"><i class="fa-solid fa-play"></i> Vídeos</a>
        <a href="links.html"><i class="fa-solid fa-link"></i> Links</a>
    </div>
</nav>

<div class="statusbar">
    <div class="status-item">
        <span class="dot" id="liveDot"></span>
        <span id="liveText">Link: Offline</span>
    </div>
    <div class="status-item">
        <i class="fa-solid fa-users"></i>
        <span id="memberCount">--</span> ELITES
    </div>
    <button class="btn-refresh" onclick="carregarRanking()" title="Sincronizar">
        <i class="fa-solid fa-rotate"></i>
    </button>
</div>

<div class="container">
    <header class="page-header">
        <h1 class="text-gradient">Ranking de Elite</h1>
        <p>A HIERARQUIA DOS QUE CONSTRUEM O FUTURO</p>
    </header>

    <div class="ranking-grid" id="membersGrid">
        </div>
</div>

<div class="app-footer">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Início</span></a>
    <a href="membros.html" class="active"><i class="fa-solid fa-crown"></i><span>Membros</span></a>
    <a href="videos.html"><i class="fa-solid fa-play"></i><span>Vídeos</span></a>
    <a href="links.html"><i class="fa-solid fa-link"></i><span>Links</span></a>
</div>

<script>
    const BACKEND_BASE = "https://mindset-elite.onrender.com";
    const DEFAULT_AVATAR = "https://ui-avatars.com/api/?background=0D1117&color=00e0ff&bold=true&name=";

    function setSystemStatus(isOnline) {
        const dot = document.getElementById("liveDot");
        const text = document.getElementById("liveText");
        dot.className = isOnline ? "dot online" : "dot";
        text.textContent = isOnline ? "Link: Online" : "Link: Offline";
    }

    async function carregarRanking() {
        const grid = document.getElementById("membersGrid");
        const countEl = document.getElementById("memberCount");
        
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; color: var(--primary);"></i>
                            <p style="margin-top: 15px; color: var(--text-dim); font-size: 12px;">ACESSANDO DATABASE...</p>
                         </div>`;

        try {
            const res = await fetch(`${BACKEND_BASE}/ranking`, { cache: "no-store" });
            const data = await res.json();
            const list = data.ranking || [];

            countEl.textContent = list.length;
            grid.innerHTML = "";
            setSystemStatus(true);

            if (list.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--text-dim);'>Nenhum Elite recrutado ainda.</p>";
                return;
            }

            list.forEach((user, index) => {
                const pos = index + 1;
                const xp = 500 + (user.idade * 7); // Cálculo de XP fictício baseado na idade
                const card = document.createElement("div");
                card.className = `member-card rank-${pos <= 3 ? pos : 'n'}`;
                
                // Gera avatar automático baseado no nome se não houver foto
                const avatarUrl = user.foto || `${DEFAULT_AVATAR}${encodeURIComponent(user.nome)}`;

                card.innerHTML = `
                    <span class="rank-position">#${pos}</span>
                    <span class="xp-tag">${xp} XP</span>
                    <div class="avatar-container">
                        <img src="${avatarUrl}" alt="${user.nome}" onerror="this.src='${DEFAULT_AVATAR}'">
                    </div>
                    <div class="member-info">
                        <h3>${user.nome}</h3>
                        <p><i class="fa-brands fa-telegram"></i> ${user.telegram}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (err) {
            setSystemStatus(false);
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #ff4d4d; padding: 40px;">
                                <i class="fa-solid fa-triangle-exclamation"></i><br>Falha na conexão com a HQ.
                              </p>`;
        }
    }

    // Iniciar
    document.addEventListener("DOMContentLoaded", carregarRanking);
</script>

<script src="layout.v3.js" defer></script>
</body>
</html>
