<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membros - Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(135deg,#000,#0a0f1c);
  color:#fff;
  overflow-x:hidden;
  padding-bottom:80px;
}

/* ================= NAV ================= */

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:16px;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(0,153,255,0.4);
  z-index:1000;
  flex-wrap:wrap;
}

nav a{
  color:#fff;
  text-decoration:none;
  font-weight:600;
  padding:8px 14px;
  border-radius:25px;
  transition:0.3s;
  font-size:14px;
}

nav a:hover{
  background:#00F5FF;
  color:#000;
  box-shadow:0 0 20px #00F5FF;
}

/* ================= CONTAINER ================= */

.container{
  max-width:1100px;
  margin:auto;
  padding:140px 20px 100px 20px;
}

h2{
  font-size:28px;
  margin-bottom:40px;
  border-left:5px solid #00F5FF;
  padding-left:15px;
}

/* ================= LISTA PARTICIPANTES ================= */

.card{
  background:rgba(15,20,35,0.95);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(0,153,255,0.3);
  box-shadow:0 0 25px rgba(0,153,255,0.2);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:15px;
}

.row:last-child{
  border-bottom:none;
}

.confirmado{
  color:#00FFAA;
}

.indefinido{
  color:#00BFFF;
}

.nao{
  color:#FF4C4C;
}

.vagas{
  margin-top:30px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#00F5FF;
}

/* ===================================================== */
/* ================= MOBILE APP STYLE ================= */
/* ===================================================== */

@media (max-width:768px){

  body{
    padding-bottom:100px;
  }

  nav{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:12px 0;
    border-top:1px solid rgba(0,153,255,0.4);
    border-bottom:none;
  }

  nav a{
    font-size:12px;
    padding:4px 6px;
  }

  .container{
    padding:80px 15px 120px 15px;
  }

  h2{
    font-size:22px;
  }

  .row{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
  }

  .vagas{
    font-size:16px;
  }

}


</style>
</head>

<body>

<canvas id="bg3d"></canvas>

<nav class="navbar">
  <a href="index.html">🏠<span>Início</span></a>
  <a href="membros.html">👑<span>Membros</span></a>
  <a href="participantes.html">🎯<span>Participantes</span></a>
  <a href="videos.html">🎬<span>Vídeos</span></a>
  <a href="links.html">🔗<span>Links</span></a>
  <a href="formulario.html">📝<span>Formulário</span></a>
</nav>

<div class="container">
<h2>🏆 Ranking Mindset Elite</h2>
<div class="grid" id="membersGrid">
Carregando ranking...
</div>
</div>

<script>

/* ================= FUNDO 3D (DESKTOP APENAS) ================= */

if(window.innerWidth > 768){

const canvas = document.getElementById("bg3d");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
);

const renderer = new THREE.WebGLRenderer({
canvas:canvas,
alpha:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

const geometry = new THREE.BufferGeometry();
const vertices = [];

for(let i=0;i<1000;i++){
vertices.push(
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000),
THREE.MathUtils.randFloatSpread(2000)
);
}

geometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
);

const material = new THREE.PointsMaterial({
color:0x0099ff,
size:2
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

camera.position.z = 600;

function animate(){
requestAnimationFrame(animate);
particles.rotation.x += 0.0002;
particles.rotation.y += 0.0002;
renderer.render(scene, camera);
}
animate();

}

/* ================= RANKING ROBUSTO ================= */

async function carregarRanking(){

const grid = document.getElementById("membersGrid");

try{

const res = await fetch("https://mindset-elite.onrender.com/ranking");

if(!res.ok){
grid.innerHTML="⚠ Ranking indisponível.";
return;
}

const data = await res.json();

grid.innerHTML="";

if(!data.ranking || data.ranking.length === 0){
grid.innerHTML="Nenhum membro ainda.";
return;
}

data.ranking.forEach(user=>{

let medal="";
if(user.rank===1) medal="🥇";
else if(user.rank===2) medal="🥈";
else if(user.rank===3) medal="🥉";

const fotoPath = user.foto
? `/images/${user.foto}`
: "/images/default.jpg";

const card = document.createElement("div");
card.className="member-card";

card.innerHTML=`
<div class="rank">#${user.rank} ${medal}</div>
<div class="avatar-wrapper">
<img src="${fotoPath}" alt="${user.nome}">
</div>
<h3>${user.nome}</h3>
<p>${user.idade || 0} anos</p>
`;

const img = card.querySelector("img");

/* Fallback profissional */
img.onerror = function(){
this.onerror=null;
this.src="/images/default.jpg";
};

grid.appendChild(card);

});

}catch(err){
grid.innerHTML="⚠ Erro ao carregar ranking.";
console.error(err);
}

}

carregarRanking();

</script>
<script src="layout.js?v=2"></script>
</body>
</html>
