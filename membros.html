<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Membros - Mindset Elite</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --mobile-nav-height:78px;
  --bg-primary:#05070d;
  --text-primary:#ffffff;
  --accent:#00F5FF;
  --danger:#FF4D4D;
  --ok:#00FFAA;
}

body{
  font-family:'Orbitron',sans-serif;
  color:var(--text-primary);
  overflow-x:hidden;
  background:var(--bg-primary);
  transition:background .4s ease,color .4s ease;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:22px;
  padding:16px;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:var(--text-primary);
  text-decoration:none;
  padding:8px 14px;
  border-radius:22px;
  transition:.25s;
  font-size:14px;
}

.navbar a:hover{
  background:var(--accent);
  color:#000;
}

/* STATUS */
.statusbar{
  position:fixed;
  top:75px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.5);
  border:1px solid var(--accent);
  font-size:11px;
  z-index:999;
}

.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--danger);
}
.dot.ok{ background:var(--ok); }

.badge{
  padding:4px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  font-size:10px;
  font-weight:900;
}

.btn-mini{
  border:none;
  cursor:pointer;
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
  background:linear-gradient(90deg,var(--accent),#0099FF);
  color:#000;
  font-size:11px;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:150px 20px 120px;
  position:relative;
  z-index:1;
}

h2{
  text-align:center;
  font-size:26px;
  margin-bottom:25px;
  background:linear-gradient(90deg,var(--accent),#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:25px;
}

/* CARD */
.member-card{
  background:rgba(15,20,35,.85);
  padding:22px;
  border-radius:22px;
  text-align:center;
  border:1px solid var(--accent);
  transition:.25s;
  position:relative;
  backdrop-filter:blur(10px);
}

.member-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 35px var(--accent);
}

.rank{
  position:absolute;
  top:12px;
  right:14px;
  font-size:12px;
  font-weight:900;
  color:var(--accent);
}

.xp{
  position:absolute;
  top:12px;
  left:14px;
  font-size:11px;
  padding:5px 8px;
  border-radius:999px;
  background:rgba(0,0,0,.5);
}

.avatar-wrapper{
  width:90px;
  height:90px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:2px solid var(--accent);
  margin-bottom:14px;
}

.avatar-wrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.member-card h3{
  font-size:15px;
  margin-bottom:4px;
}

.member-card p{
  font-size:12px;
  opacity:.8;
}

/* MOBILE */
@media(max-width:768px){

  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 6px calc(10px + env(safe-area-inset-bottom));
  }

  .navbar a{
    flex-direction:column;
    font-size:11px;
  }

  .container{
    padding:100px 15px 100px;
  }

  h2{ font-size:20px; }
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="statusbar">
  <span class="dot" id="liveDot"></span>
  <span id="liveText">Live: offline</span>
  <span class="badge" id="liveBadge">0</span>
  <button class="btn-mini" onclick="carregarRanking()">↻</button>
</div>

<div class="container">
  <h2>🏆 Ranking Mindset Elite</h2>
  <div class="grid" id="membersGrid">
    Carregando ranking…
  </div>
</div>

<script>
const BACKEND_BASE = "https://mindset-elite.onrender.com";
const RANKING_URL = BACKEND_BASE + "/ranking";
const DEFAULT_AVATAR = BACKEND_BASE + "/images/default.jpg";

function setLive(ok){
  document.getElementById("liveDot").className = ok ? "dot ok" : "dot";
  document.getElementById("liveText").textContent = ok ? "Live: online" : "Live: offline";
}

function calcXP(user){
  const idade = Number(user?.idade ?? 0);
  return 500 + (idade * 3);
}

async function carregarRanking(){
  const grid = document.getElementById("membersGrid");
  grid.innerHTML = "Carregando ranking…";

  try{
    const res = await fetch(RANKING_URL,{cache:"no-store"});
    if(!res.ok) throw new Error();

    const data = await res.json();
    const list = Array.isArray(data?.ranking)?data.ranking:[];

    if(list.length===0){
      grid.innerHTML="Nenhum membro ainda.";
      setLive(true);
      return;
    }

    const sorted=list.map(u=>({...u,xp:calcXP(u)}))
                     .sort((a,b)=>b.xp-a.xp);

    grid.innerHTML="";

    sorted.forEach((u,i)=>{
      const card=document.createElement("div");
      card.className="member-card";
      card.innerHTML=`
        <div class="xp">⚡ XP ${u.xp}</div>
        <div class="rank">#${i+1}</div>
        <div class="avatar-wrapper">
          <img src="${u.foto?BACKEND_BASE+"/images/"+u.foto:DEFAULT_AVATAR}">
        </div>
        <h3>${u.nome||"Sem nome"}</h3>
        <p>${u.idade||""} anos</p>
      `;
      grid.appendChild(card);
    });

    setLive(true);

  }catch{
    grid.innerHTML="Erro ao carregar ranking.";
    setLive(false);
  }
}

carregarRanking();
</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
