<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Participantes - Mindset Elite</title>

<!-- PERFORMANCE -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Orbitron',sans-serif;
  background:#05070d;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* ================= NAV ================= */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:25px;
  padding:18px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 16px;
  border-radius:25px;
  transition:.3s;
  font-size:14px;
}

.navbar a:hover{
  background:#00F5FF;
  color:#000;
  box-shadow:0 0 20px #00F5FF;
}

/* ================= FUNDO ================= */

#particles-js{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* ================= CONTAINER ================= */

.container{
  max-width:1000px;
  margin:auto;
  padding:150px 20px 120px;
}

h2{
  font-size:30px;
  text-align:center;
  margin-bottom:60px;
  background:linear-gradient(90deg,#00F5FF,#fff,#00F5FF);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= CARD ================= */

.card{
  background:rgba(15,20,35,0.95);
  padding:40px;
  border-radius:30px;
  border:1px solid rgba(0,153,255,0.25);
  box-shadow:0 0 50px rgba(0,153,255,0.15);
}

/* ================= LINHAS ================= */

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition:.3s ease;
  opacity:0;
  transform:translateY(20px);
}

.row.show{
  opacity:1;
  transform:translateY(0);
  transition:all .6s ease;
}

.row:last-child{
  border-bottom:none;
}

.row:hover{
  transform:translateX(8px);
  color:#00F5FF;
}

/* ================= STATUS BADGES ================= */

.status{
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.5px;
}

.confirmado{
  background:rgba(0,255,170,.15);
  color:#00FFAA;
  border:1px solid #00FFAA;
  box-shadow:0 0 10px rgba(0,255,170,.3);
}

.indefinido{
  background:rgba(0,245,255,.15);
  color:#00F5FF;
  border:1px solid #00F5FF;
}

.nao{
  background:rgba(255,76,76,.15);
  color:#FF4C4C;
  border:1px solid #FF4C4C;
}

/* ================= VAGAS ================= */

.vagas{
  margin-top:40px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  color:#00F5FF;
  text-shadow:0 0 12px #00F5FF;
}

/* ================= MOBILE APP ================= */

@media (max-width:768px){

  body{padding-bottom:100px;}

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:12px 0;
    border-top:1px solid rgba(0,153,255,.4);
  }

  .navbar a{
    flex-direction:column;
    font-size:18px;
  }

  .container{
    padding:100px 15px 150px;
  }

  .row{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
  }

}
</style>
</head>

<body>

<div id="particles-js"></div>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">
  <h2>Participantes Mindset 2029</h2>

  <div class="card" id="listaParticipantes">

    <div class="row"><span>Tuzin</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Luqueta</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Vini</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>THZIN</span> <span class="status indefinido">Indefinido</span></div>
    <div class="row"><span>Leandro</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Elizeu</span> <span class="status nao">Não participa</span></div>
    <div class="row"><span>Mistério</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Pandinha</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Daniel Nascimento</span> <span class="status confirmado">Confirmado</span></div>

    <div class="vagas" id="vagasInfo">Carregando vagas...</div>

  </div>
</div>

<script defer>

/* ================= PARTÍCULAS OTIMIZADAS ================= */
if(window.innerWidth > 600 && window.particlesJS){
  particlesJS("particles-js",{
    particles:{
      number:{value:35},
      color:{value:"#00F5FF"},
      line_linked:{enable:true,color:"#00F5FF"},
      move:{speed:0.6}
    }
  });
}

/* ================= ANIMAÇÃO ENTRADA ================= */
const rows=document.querySelectorAll(".row");
rows.forEach((row,index)=>{
  setTimeout(()=>{
    row.classList.add("show");
  }, index*100);
});

/* ================= VAGAS ================= */
async function carregarVagas(){
  try{
    const res = await fetch("https://mindset-elite.onrender.com/vagas", {
      cache: "no-store"
    });
    const data = await res.json();
    document.getElementById("vagasInfo").innerText =
      "Vagas disponíveis: " + data.vagas;
  }catch{
    document.getElementById("vagasInfo").innerText =
      "Não foi possível carregar vagas.";
  }
}
carregarVagas();

</script>

<script src="layout.v3.js" defer></script>

</body>
</html>
