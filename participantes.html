<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Participantes - Mindset Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --mobile-nav-height:78px;
  --cyan:#00F5FF;
  --ok:#00FFAA;
  --danger:#FF4C4C;
}

body{
  font-family:'Orbitron',sans-serif;
  background:#05070d;
  color:#fff;
  min-height:100vh;
}

/* ================= NAV ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:22px;
  padding:16px;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(15px);
  z-index:1000;
}

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:8px 14px;
  border-radius:22px;
  transition:.25s;
  font-size:14px;
}

.navbar a:hover{
  background:var(--cyan);
  color:#000;
}

/* ================= CONTAINER ================= */
.container{
  max-width:900px;
  margin:auto;
  padding:150px 20px 120px;
}

h2{
  text-align:center;
  font-size:26px;
  margin-bottom:35px;
  background:linear-gradient(90deg,var(--cyan),#fff,var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= CARD ================= */
.card{
  background:rgba(15,20,35,.95);
  padding:30px;
  border-radius:25px;
  border:1px solid rgba(0,153,255,.25);
  box-shadow:0 0 30px rgba(0,153,255,.15);
}

/* ================= LINHAS ================= */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
  font-size:14px;
  transition:.2s;
}

.row:last-child{
  border-bottom:none;
}

.row:hover{
  color:var(--cyan);
  transform:translateX(5px);
}

/* ================= STATUS ================= */
.status{
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.confirmado{
  background:rgba(0,255,170,.15);
  color:var(--ok);
  border:1px solid var(--ok);
}

.indefinido{
  background:rgba(0,245,255,.15);
  color:var(--cyan);
  border:1px solid var(--cyan);
}

.nao{
  background:rgba(255,76,76,.15);
  color:var(--danger);
  border:1px solid var(--danger);
}

/* ================= VAGAS ================= */
.vagas{
  margin-top:25px;
  text-align:center;
  font-size:15px;
  font-weight:700;
  color:var(--cyan);
}

/* ================= MOBILE ================= */
@media(max-width:768px){

  body{
    padding-bottom:calc(var(--mobile-nav-height) + env(safe-area-inset-bottom));
  }

  .navbar{
    top:auto;
    bottom:0;
    justify-content:space-around;
    padding:10px 5px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(0,153,255,.3);
  }

  .navbar a{
    flex-direction:column;
    font-size:11px;
    padding:6px;
  }

  .container{
    padding:100px 15px 100px;
  }

  h2{
    font-size:20px;
  }

  .card{
    padding:22px;
  }

  .row{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
    font-size:13px;
  }

  .status{
    font-size:10px;
    padding:4px 10px;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="index.html">🏠 Início</a>
  <a href="membros.html">👑 Membros</a>
  <a href="participantes.html">🎯 Participantes</a>
  <a href="videos.html">🎬 Vídeos</a>
  <a href="links.html">🔗 Links</a>
  <a href="formulario.html">📝 Formulário</a>
</nav>

<div class="container">
  <h2>Participantes Mindset 2029</h2>

  <div class="card">

    <div class="row"><span>Tuzin</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Luqueta</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Vini</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>THZIN</span> <span class="status indefinido">Indefinido</span></div>
    <div class="row"><span>Leandro</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Elizeu</span> <span class="status nao">Não participa</span></div>
    <div class="row"><span>Mistério</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Pandinha</span> <span class="status confirmado">Confirmado</span></div>
    <div class="row"><span>Daniel Nascimento</span> <span class="status confirmado">Confirmado</span></div>

    <div class="vagas" id="vagasInfo">Carregando vagas...</div>

  </div>
</div>

<script>
async function carregarVagas(){
  try{
    const res = await fetch("https://mindset-elite.onrender.com/vagas",{cache:"no-store"});
    const data = await res.json();
    document.getElementById("vagasInfo").innerText =
      "Vagas disponíveis: " + data.vagas;
  }catch{
    document.getElementById("vagasInfo").innerText =
      "Não foi possível carregar vagas.";
  }
}
carregarVagas();
</script>

</body>
</html>
